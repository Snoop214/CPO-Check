<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--primary:#FF5A00;--dark:#411517;--cream:#F4EDE3;--bg:#f8f5f0;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e0db;--success:#059669;--warning:#d97706;--danger:#dc2626;--purple:#7c3aed;--blue:#1d4ed8;--radius:10px;--shadow:0 2px 8px rgba(65,21,23,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--dark);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);border-top:3px solid var(--primary)}
.header h1{font-size:19px;font-weight:600}
.header h1 span{color:var(--primary)}
.nav-tabs{display:flex;margin-left:20px}
.nav-tabs button{padding:9px 20px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.nav-tabs button.active{color:#fff;border-bottom-color:var(--primary)}
.nav-tabs button:hover{color:#fff}
.user-badge{font-size:11px;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:6px}
.user-badge .role{color:var(--primary);font-weight:600;text-transform:uppercase;font-size:10px}
.controls{padding:12px 28px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.period-toggle{display:flex;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border)}
.period-toggle button{padding:7px 16px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s}
.period-toggle button.active{background:var(--primary);color:#fff}
.fg{display:flex;align-items:center;gap:5px}
.fg label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input[type=text]{padding:6px 24px 6px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;background:var(--card);cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 7px center}
.fg select:focus{outline:none;border-color:var(--primary)}
.btn{padding:7px 14px;border:none;border-radius:var(--radius);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#e04e00}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spacer{flex:1}
.refresh-info{font-size:10px;color:var(--muted);text-align:right;line-height:1.4}
.content{padding:20px 28px}
.sync-banner{display:flex;align-items:center;gap:10px;background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--blue)}
.sync-banner i{font-size:16px;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--radius);padding:18px;border-left:4px solid var(--primary);box-shadow:var(--shadow)}
.kpi:nth-child(2){border-left-color:var(--blue)}
.kpi:nth-child(3){border-left-color:var(--success)}
.kpi:nth-child(4){border-left-color:var(--danger)}
.kpi:nth-child(5){border-left-color:var(--purple)}
.kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-value{font-size:24px;font-weight:700;color:var(--dark);line-height:1.1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.table-toolbar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.search-input{padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;width:240px;transition:width .2s}
.search-input:focus{outline:none;border-color:var(--primary);width:300px}
.tbl-scroll{overflow:auto;max-height:480px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--dark);color:#fff;padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;white-space:nowrap;position:sticky;top:0;user-select:none}
thead th:hover{background:#5a2225}
thead th.sorted{color:var(--primary)}
tbody td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:nth-child(even){background:#faf6f1}
tbody tr:hover{background:#f0ebe4}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-weight:600;font-size:11px}
.cpo-low{background:#ecfdf5;color:#059669}.cpo-med{background:#fffbeb;color:#d97706}.cpo-high{background:#fef2f2;color:#dc2626}
.utr-badge{background:#eff6ff;color:var(--blue)}
/* Settings */
.settings-page{padding:20px 28px}
.settings-layout{display:flex;gap:20px}
.settings-sidebar{width:200px;flex-shrink:0}
.settings-sidebar button{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:8px;margin-bottom:2px;transition:all .15s;text-align:left}
.settings-sidebar button.active{background:var(--primary);color:#fff}
.settings-sidebar button:hover:not(.active){background:var(--cream);color:var(--text)}
.settings-main{flex:1;background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);min-height:400px}
.s-title{font-size:15px;font-weight:600;color:var(--dark);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-row{display:flex;gap:10px;margin-bottom:10px;align-items:end}
.form-group{flex:1}
.form-group label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.form-group input,.form-group select{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.cfg-table{width:100%;border-collapse:collapse;margin-top:10px}
.cfg-table th{background:var(--cream);padding:7px 10px;font-size:10px;text-align:left;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)}
.cfg-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--border)}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.tag-admin{background:#dbeafe;color:#1d4ed8}.tag-manager{background:#fef3c7;color:#92400e}.tag-supervisor{background:#d1fae5;color:#065f46}.tag-viewer{background:#f3f4f6;color:#6b7280}
/* Historical & Trends */
.hist-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--cream);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.month-checkboxes{display:flex;flex-wrap:wrap;gap:6px}
.month-cb{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;transition:all .15s}
.month-cb.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.toggle-group{display:flex;background:var(--card);border-radius:8px;border:1.5px solid var(--border);overflow:hidden}
.toggle-group button{padding:5px 12px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer}
.toggle-group button.active{background:var(--dark);color:#fff}
.chart-wrap{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
.chart-wrap canvas{max-height:300px}
/* Toast & Confirm */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:500;z-index:500;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:12px;padding:28px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.confirm-title{font-size:15px;font-weight:600;color:var(--dark);margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.kpi{position:relative}
.kpi-info{position:absolute;top:10px;right:10px;color:var(--muted);font-size:13px;cursor:help;opacity:.5;transition:opacity .2s}
.kpi-info:hover{opacity:1;color:var(--primary)}
.kpi-info:hover .kpi-tooltip{display:block}
.kpi-tooltip{display:none;position:absolute;right:0;top:22px;background:var(--dark);color:#fff;font-size:11px;line-height:1.6;padding:10px 14px;border-radius:8px;width:220px;z-index:50;white-space:normal;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.kpi-tooltip::before{content:'';position:absolute;top:-6px;right:8px;border:6px solid transparent;border-bottom-color:var(--dark);border-top:none}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.content{padding:14px}.header{padding:10px 14px}.settings-layout{flex-direction:column}.settings-sidebar{width:100%;display:flex;flex-wrap:wrap;gap:4px}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center">
    <h1><i class="fas fa-chart-line" style="color:var(--primary);margin-right:7px"></i>talabat <span>LS</span> — CPO Check</h1>
    <div class="nav-tabs" id="navTabs">
      <button class="active" onclick="switchView('dashboard')"><i class="fas fa-chart-bar" style="margin-right:4px"></i>Dashboard</button>
      <button onclick="switchView('historical')"><i class="fas fa-history" style="margin-right:4px"></i>Historical &amp; Trends</button>
      <button onclick="switchView('optimizer')"><i class="fas fa-calculator" style="margin-right:4px"></i>Cost Optimizer</button>
      <button onclick="switchView('settings')" id="settingsNavBtn"><i class="fas fa-cog" style="margin-right:4px"></i>Settings</button>
      <button onclick="switchView('dataformat')"><i class="fas fa-table" style="margin-right:4px"></i>Data Format</button>
    </div>
  </div>
  <div class="user-badge" id="userBadge"><i class="fas fa-user"></i><span id="userEmail">Loading...</span><span class="role" id="userRole"></span></div>
</div>

<div class="controls" id="controlsBar">
  <div class="period-toggle" id="periodToggle">
    <button data-p="mtd" data-i="-1" class="active">MTD</button>
    <button data-p="mtd" data-i="pick">Daily</button>
    <button data-p="weekly" data-i="pick">Weekly</button>
    <button data-p="monthly" data-i="pick">Monthly</button>
  </div>
  <div class="fg" id="datePickerGroup" style="display:none">
    <label>Select</label>
    <select id="datePicker" style="background-image:none;padding-right:8px"></select>
    <button class="btn btn-primary btn-sm" onclick="computeSelected()" style="white-space:nowrap"><i class="fas fa-play"></i> Compute</button>
  </div>
  <div class="fg"><label>Chain</label><select id="fChain" onchange="applyFilters()"><option value="">All</option></select></div>
  <div class="fg"><label>City</label><select id="fCity" onchange="applyFilters()"><option value="">All</option></select></div>
  <div class="fg"><label>Supervisor</label><select id="fSup" onchange="applyFilters()"><option value="">All</option></select></div>
  <div class="fg"><label>3PL</label><select id="f3PL" onchange="applyFilters()"><option value="">All</option></select></div>
  <div class="fg"><label>Type</label>
    <select id="fType" onchange="onTypeChange()">
      <option value="Picker">Picker</option>
      <option value="Picker,Scanner">Picker+Scanner</option>
      <option value="Picker,Scanner,Retail Hub Scanner">All Types</option>
    </select>
  </div>
  <div class="spacer"></div>
  <div class="refresh-info" id="refreshInfo">Last refresh: —</div>
  <button class="btn btn-primary" onclick="doRefresh()" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
</div>

<div id="mainContent"><div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--muted)">Loading all data...</div></div></div>

<div class="confirm-overlay" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">Confirm</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm(false)">Cancel</button>
      <button class="btn btn-primary" id="confirmOk" onclick="closeConfirm(true)">Confirm</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ================================================================
// STATIC HOSTING SHIM — replaces google.script.run with fetch('data/...')
// When running on GitHub Pages, this intercepts all server calls.
// When running inside GAS, google.script.run is defined natively and this shim is never used.
// ================================================================
if(typeof google==='undefined'||!google.script||window.location.hostname.indexOf('github.io')>=0||window.location.protocol==='file:'){
  window._staticMode=true;
  var _cbust='?t='+Date.now();
  var _fetchJSON=function(url){return fetch(url+_cbust).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});};
  var _dataFetchers={
    getInitialData:function(){
      return Promise.all([
        _fetchJSON('data/meta.json'),
        _fetchJSON('data/cpo_mtd_summary.json'),
        _fetchJSON('data/raw_master.json'),
        _fetchJSON('config/app_config.json'),
        _fetchJSON('data/hourly.json').catch(function(){return {};}),
        _fetchJSON('data/hourly_gmv.json').catch(function(){return {};}),
        _fetchJSON('data/timing.json').catch(function(){return {};}),
        _fetchJSON('config/users.json').catch(function(){return [];}),
      ]).then(function(res){
        var meta=res[0],mtd=res[1],master=res[2],cfg=res[3],
            hourly=res[4],gmv=res[5],timing=res[6],users=res[7];
        var userEmail=window._staticUserEmail||'';
        var userRec=(users||[]).filter(function(u){return u.email===userEmail;})[0]||{email:userEmail,role:'Admin',name:''};
        window._staticUsers=users||[];
        return {
          periodsData:{
            mtd:    {orderDates:meta.dates.mtd||[]},
            weekly: {orderDates:meta.dates.weekly||[]},
            monthly:{orderDates:meta.dates.monthly||[]},
          },
          config:{
            vendor_rates:   cfg.vendor_rates||[],
            employee_costs: cfg.employee_costs||[],
            working_days:   cfg.working_days||[],
          },
          optimizerConfig: cfg.optimizer||{},
          user:     {email:userRec.email,role:userRec.role,name:userRec.name},
          timestamp:meta.timestamp,
          mtdSync:  {syncDate:meta.syncDate},
          masterData:master,
          mtdCPO:   mtd,
          hourlyData:    hourly,
          hourlyGMVData: gmv,
          storeTimingData: timing,
        };
      });
    },
    getCPOData:function(period,dateIdx,types){
      var dates=(window._staticMeta&&window._staticMeta.dates[period])||[];
      var dl=dates[dateIdx]?dates[dateIdx].substring(0,10):'';
      var fname=period==='monthly'?'cpo_monthly_'+dl.substring(0,7)+'.json':
                period==='weekly' ?'cpo_weekly_'+dl+'.json':
                                    'cpo_daily_'+dl+'.json';
      return _fetchJSON('data/'+fname);
    },
    refreshAllData:function(){
      return Promise.resolve({success:true,timestamp:new Date().toISOString(),message:'Static mode: run GitHub Actions to refresh data.'});
    },
    getHistoricalTrendData:function(period,metric,filters){
      return Promise.resolve({labels:[],datasets:[],tableData:[]});
    },
    loadUsers:function(){
      return Promise.resolve(window._staticUsers||[]);
    },
    getSupervisorList:function(){
      return Promise.resolve([]);
    },
  };
  // Build the google.script.run shim
  window.google={script:{run:{}}};
  (function(){
    var _successHandler=null,_failureHandler=null;
    function makeRunner(){
      var runner={};
      // withSuccessHandler/withFailureHandler must return the Proxy (not the plain runner)
      // so that chaining .withSuccessHandler(...).withFailureHandler(...).methodName() works
      runner.withSuccessHandler=function(fn){_successHandler=fn;return _proxy;};
      runner.withFailureHandler=function(fn){_failureHandler=fn;return _proxy;};
      var _proxy=new Proxy(runner,{
        get:function(target,prop){
          if(prop in target)return target[prop];
          return function(){
            var args=Array.prototype.slice.call(arguments);
            var fetcher=_dataFetchers[prop];
            var p=fetcher?fetcher.apply(null,args):Promise.resolve({error:'Not supported in static mode: '+prop});
            p.then(function(result){
              if(_successHandler){_successHandler(result);}
              _successHandler=null;_failureHandler=null;
            }).catch(function(err){
              if(_failureHandler){_failureHandler({message:String(err)});}
              else{console.error('Static shim error for '+prop+':',err);}
              _successHandler=null;_failureHandler=null;
            });
          };
        }
      });
      return _proxy;
    }
    // When meta loads, cache it for getCPOData date lookups
    _fetchJSON('data/meta.json').then(function(m){window._staticMeta=m;}).catch(function(){});
    window.google.script.run=new Proxy({},{
      get:function(target,prop){
        if(prop==='withSuccessHandler'||prop==='withFailureHandler'){
          return function(fn){
            var runner=makeRunner();
            runner[prop](fn);
            return runner;
          };
        }
        return function(){
          var args=Array.prototype.slice.call(arguments);
          var fetcher=_dataFetchers[prop];
          var p=fetcher?fetcher.apply(null,args):Promise.resolve({error:'Not supported in static mode: '+prop});
          p.then(function(result){console.log('static:'+prop,result);}).catch(function(e){console.error(e);});
        };
      }
    });
  })();

  // Login wall for static mode — proper HTML form (prompt() is blocked in modern browsers)
  (function(){
    var stored=localStorage.getItem('cpo_static_user');
    if(stored){window._staticUserEmail=stored;return;}
    // Inject login overlay
    var overlay=document.createElement('div');
    overlay.id='static-login-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:#411517;display:flex;align-items:center;justify-content:center;z-index:99999;';
    overlay.innerHTML='<div style="background:#fff;border-radius:12px;padding:40px 48px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4)">'
      +'<div style="font-size:28px;font-weight:700;color:#FF5A00;margin-bottom:4px;">talabat LS</div>'
      +'<div style="color:#411517;font-weight:600;margin-bottom:28px;">CPO Check</div>'
      +'<input id="static-login-input" type="email" placeholder="Enter your email" autocomplete="email" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;" />'
      +'<button id="static-login-btn" style="width:100%;padding:12px;background:#FF5A00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">Continue</button>'
      +'<div id="static-login-err" style="color:#c00;margin-top:10px;font-size:13px;display:none;"></div>'
      +'</div>';
    document.body.appendChild(overlay);
    function doLogin(){
      var email=(document.getElementById('static-login-input').value||'').trim().toLowerCase();
      if(!email||!email.includes('@')){
        var e=document.getElementById('static-login-err');e.style.display='';e.textContent='Enter a valid email.';return;
      }
      localStorage.setItem('cpo_static_user',email);
      window._staticUserEmail=email;
      document.getElementById('static-login-overlay').remove();
    }
    document.getElementById('static-login-btn').addEventListener('click',doLogin);
    document.getElementById('static-login-input').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
    // Pause execution until login completes — done via overlay removal triggering APP init
    // We need to defer the rest of the app init; patch getInitialData to wait
    window._staticLoginPending=true;
    var _origInit=window._staticShimReady;
  })();
}
// ================================================================
// APP STATE — all data loaded ONCE, tab switches never hit server
// ================================================================
var APP = {
  user:{}, config:{}, periodsData:{}, timestamp:null, mtdSync:null,
  currentView:'dashboard', currentPeriod:'mtd', currentDateIdx:-1,
  currentSettingsTab:'rates', sortCol:'orders', sortAsc:false,
  allData:[], filteredData:[],   // current dashboard data
  histData:[],                   // historical combined months
  histSelectedIds:[],            // selected archive fileIds
  histMetric:'both',             // cpo / utr / both
  histLevel:'store',             // store / chain
  trendChart:null,
  optimizerConfig:{currency:'AED', actionThreshold:4.0, criticalThreshold:20.0},
  _checklistOpen:true
};

// ================================================================
// INIT — single server call, everything loaded at once
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('#periodToggle button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#periodToggle button').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      var p=btn.dataset.p, i=btn.dataset.i;
      APP.currentPeriod=p;
      if(i==='-1'){
        APP.currentDateIdx=-1;
        document.getElementById('datePickerGroup').style.display='none';
        renderFromMemoryOrFetch();
      } else {
        document.getElementById('datePickerGroup').style.display='';
        populateDatePicker(p);
      }
    });
  });
  showLoading('Loading MTD data...');
  google.script.run.withSuccessHandler(onInitialData).withFailureHandler(onError).getInitialData();
});

function onInitialData(r) {
  APP.periodsData = r.periodsData||{};
  APP.config      = r.config||{};
  APP.user        = r.user||{};
  APP.timestamp   = r.timestamp;
  APP.mtdSync     = r.mtdSync||{};
  APP.masterData  = r.masterData||{}; // ALL stores from master sheet
  // Cache store: key = "period_dateIdx_type" → CPO result
  if(!APP.cache)APP.cache={};
  // Store the MTD summary result
  if(r.mtdCPO&&!r.mtdCPO.error){
    APP.cache['mtd_-1_Picker']=r.mtdCPO;
  }

  if(r.optimizerConfig)APP.optimizerConfig=r.optimizerConfig;
  if(r.ramadanConfig)APP.ramadanConfig=r.ramadanConfig;
  if(r.holidays)APP.holidays=r.holidays;
  if(r.hourlyData)APP.hourlyData=r.hourlyData;
  if(r.hourlyGMVData)APP.hourlyGMVData=r.hourlyGMVData;
  if(r.storeTimingData)APP.storeTimingData=r.storeTimingData;
  document.getElementById('userEmail').textContent = APP.user.email||'Unknown';
  document.getElementById('userRole').textContent  = APP.user.role||'';

  if(APP.user.role==='revoked'){
    document.getElementById('controlsBar').style.display='none';
    document.getElementById('settingsNavBtn').style.display='none';
    document.getElementById('mainContent').innerHTML='<div class="empty-state"><i class="fas fa-lock" style="font-size:40px;color:var(--danger);opacity:.5;display:block;margin-bottom:12px"></i><h2>Access Revoked</h2><p>Contact your administrator.</p></div>';
    return;
  }
  if(APP.user.role==='viewer')document.getElementById('settingsNavBtn').style.display='none';
  if(r.timestamp)document.getElementById('refreshInfo').innerHTML='Last refresh:<br>'+formatTS(r.timestamp);

  var mtd=APP.cache['mtd_-1_Picker'];
  if(mtd&&!mtd.error){onCPOData(mtd);}
  else{showEmpty('No data cached. Click Refresh to load.');}
}

// ================================================================
// SMART RENDER — checks cache first, fetches from server only if not cached
// ================================================================
function renderFromMemoryOrFetch(){
  if(!APP.cache)APP.cache={};
  var type=document.getElementById('fType').value||'Picker';
  var cacheKey=APP.currentPeriod+'_'+APP.currentDateIdx+'_'+type;
  var cached=APP.cache[cacheKey];
  if(cached){onCPOData(cached);return;}
  // Not cached — fetch from server (one date only, ~3-5s)
  var dates=APP.periodsData[APP.currentPeriod]?APP.periodsData[APP.currentPeriod].orderDates||[]:[];
  var dateLabel=APP.currentDateIdx>=0&&dates[APP.currentDateIdx]?dates[APP.currentDateIdx].substring(0,10):'';
  var periodLabel=APP.currentPeriod==='mtd'?'Daily':APP.currentPeriod.charAt(0).toUpperCase()+APP.currentPeriod.slice(1);
  showLoading('Computing '+periodLabel+(dateLabel?' — '+dateLabel:'')+'...');
  var types=type.split(',');
  google.script.run.withSuccessHandler(function(r){
    if(!r.error)APP.cache[cacheKey]=r; // cache it — next click is instant
    onCPOData(r);
  }).withFailureHandler(onError).getCPOData(APP.currentPeriod,APP.currentDateIdx,types);
}

function onCPOData(r){
  if(r.error){showEmpty(r.error);return;}
  APP.allData=r.data||[];
  if(APP.user.role==='supervisor'&&APP.user.supervisorName){
    var sn=APP.user.supervisorName;
    APP.allData=APP.allData.filter(function(d){return d.supervisor===sn;});
  }
  APP.currentCPO=r;
  populateFilters();
  applyFilters();
}

function doRefresh(){
  var btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Refreshing...';
  google.script.run.withSuccessHandler(function(r){
    btn.disabled=false;btn.innerHTML='<i class="fas fa-sync-alt"></i> Refresh';
    document.getElementById('refreshInfo').innerHTML='Last refresh:<br>'+formatTS(r.timestamp);
    showToast('Data refreshed & archived','success');
    APP.cache={}; // clear all cached results — data changed
    showLoading('Loading MTD data...');
    google.script.run.withSuccessHandler(onInitialData).withFailureHandler(onError).getInitialData();
  }).withFailureHandler(function(e){
    btn.disabled=false;btn.innerHTML='<i class="fas fa-sync-alt"></i> Refresh';
    showToast('Refresh failed: '+e.message,'error');
  }).refreshAllData();
}

function onTypeChange(){
  APP.cache={};
  renderFromMemoryOrFetch();
}
// onDateChange removed — user must click Compute button
function computeSelected(){
  APP.currentDateIdx=parseInt(document.getElementById('datePicker').value,10)||0;
  renderFromMemoryOrFetch();
}

function populateDatePicker(period){
  var dates=APP.periodsData[period]?APP.periodsData[period].orderDates||[]:[];
  var sel=document.getElementById('datePicker');
  sel.innerHTML='';
  for(var i=0;i<dates.length;i++){
    var opt=document.createElement('option');
    opt.value=i;
    var lbl=dates[i]; if(lbl.length>=10)lbl=lbl.substring(0,10);
    opt.textContent=lbl;
    sel.appendChild(opt);
  }
  // Select last date by default (most recent), do NOT auto-compute
  if(dates.length>0){
    var lastIdx=dates.length-1;
    sel.value=lastIdx;
    APP.currentDateIdx=lastIdx;
    // Show hint but don't compute
    showEmpty('Select a date and click <strong>Compute</strong> to load data.');
  }
}

// ================================================================
// FILTERS
// ================================================================
function populateFilters(){
  var chains={},cities={},sups={},tpls={};
  APP.allData.forEach(function(r){
    if(r.chain)chains[r.chain]=1;
    if(r.city)cities[r.city]=1;
    if(r.supervisor)sups[r.supervisor]=1;
    if(r.dept3pl)r.dept3pl.split(', ').forEach(function(d){if(d)tpls[d]=1;});
  });
  fillSel('fChain',chains);fillSel('fCity',cities);
  if(APP.user.role!=='supervisor')fillSel('fSup',sups);
  fillSel('f3PL',tpls);
}
function fillSel(id,obj){
  var sel=document.getElementById(id),val=sel.value;
  sel.innerHTML='<option value="">All</option>';
  Object.keys(obj).sort().forEach(function(k){sel.innerHTML+='<option value="'+k+'">'+k+'</option>';});
  if(val)sel.value=val;
}
function applyFilters(){
  var chain=document.getElementById('fChain').value;
  var city=document.getElementById('fCity').value;
  var sup=document.getElementById('fSup').value;
  var tpl=document.getElementById('f3PL').value;
  var q=(document.getElementById('searchInput')||{}).value||'';
  q=q.toLowerCase().trim();
  APP.filteredData=APP.allData.filter(function(r){
    if(chain&&r.chain!==chain)return false;
    if(city&&r.city!==city)return false;
    if(sup&&r.supervisor!==sup)return false;
    if(tpl&&r.dept3pl.indexOf(tpl)<0)return false;
    if(q&&r.storeName.toLowerCase().indexOf(q)<0&&r.chain.toLowerCase().indexOf(q)<0&&r.vendorId.indexOf(q)<0&&r.supervisor.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  sortData();renderDashboard();
}

// ================================================================
// SORT
// ================================================================
function sortData(){
  var col=APP.sortCol,asc=APP.sortAsc;
  APP.filteredData.sort(function(a,b){
    var va=a[col],vb=b[col];
    if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();}
    return va<vb?(asc?-1:1):va>vb?(asc?1:-1):0;
  });
}
function onSort(col){
  APP.sortCol=col;APP.sortAsc=(APP.sortCol===col)?!APP.sortAsc:(col==='storeName'||col==='chain');
  APP.sortCol=col;sortData();renderDashboard();
}

// ================================================================
// TODAY'S CHECKLIST
// ================================================================
function buildChecklist(){
  var cfg=APP.optimizerConfig||{};
  var actThr=cfg.actionThreshold||4.0;
  var critThr=cfg.criticalThreshold||20.0;
  var chainSel=(document.getElementById('fChain')||{}).value||'';
  var all=(APP.allData||[]).filter(function(r){return !chainSel||r.chain===chainSel;});

  var withData=all.filter(function(r){return r.orders>0;});
  var missingAtt=all.filter(function(r){return r.orders>0&&r.pickerCount===0;});
  var critStores=all.filter(function(r){return r.pickerCPO>critThr;});
  var actionStores=all.filter(function(r){return r.pickerCPO>actThr&&r.pickerCPO<=critThr;});

  var syncDate='';
  var cpo=APP.currentCPO||{};
  if(cpo.dateLabel){var m=cpo.dateLabel.match(/to\s+(\d{4}-\d{2}-\d{2})/);if(m)syncDate=m[1];}

  var now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Dubai'}));
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var todayStr=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();

  var items=[];
  items.push({icon:'check',col:'#059669',bg:'#f0fdf4',text:withData.length+' store'+(withData.length!==1?'s':'')+' have order data'});

  if(missingAtt.length>0){
    var nm=missingAtt.slice(0,3).map(function(r){return r.storeName;}).join(', ');
    if(missingAtt.length>3)nm+=' +' +(missingAtt.length-3)+' more';
    items.push({icon:'triangle',col:'#d97706',bg:'#fffbeb',text:missingAtt.length+' store'+(missingAtt.length!==1?'s':'')+' missing attendance — '+nm});
  } else if(all.length>0){
    items.push({icon:'check',col:'#059669',bg:'#f0fdf4',text:'All stores have attendance data'});
  }

  if(critStores.length>0){
    var cn=critStores.slice(0,2).map(function(r){return r.storeName;}).join(', ');
    if(critStores.length>2)cn+=' +' +(critStores.length-2)+' more';
    items.push({icon:'circle',col:'#dc2626',bg:'#fef2f2',text:critStores.length+' store'+(critStores.length!==1?'s':'')+' CPO > '+critThr.toFixed(0)+' '+_getCurrency()+' — critical: '+cn});
  }
  if(actionStores.length>0){
    items.push({icon:'warning',col:'#ea580c',bg:'#fff7ed',text:actionStores.length+' store'+(actionStores.length!==1?'s':'')+' CPO > '+actThr.toFixed(0)+' '+_getCurrency()+' — review recommended'});
  }
  if(critStores.length===0&&actionStores.length===0&&all.length>0){
    items.push({icon:'check',col:'#059669',bg:'#f0fdf4',text:'All stores CPO within target'});
  }
  if(syncDate)items.push({icon:'chart',col:'var(--blue)',bg:'#eff6ff',text:'Data updated till: '+syncDate});

  var faMap={check:'fa-check-circle',triangle:'fa-exclamation-triangle',circle:'fa-times-circle',warning:'fa-exclamation-circle',chart:'fa-chart-bar'};
  var isOpen=APP._checklistOpen!==false;

  var h='<div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)">';
  h+='<div onclick="toggleChecklist()" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;background:var(--dark);user-select:none">';
  h+='<div style="display:flex;align-items:center;gap:10px"><i class="fas fa-clipboard-list" style="color:var(--primary)"></i>';
  h+='<span style="font-size:13px;font-weight:600;color:#fff">Today\'s Operations Checklist</span>';
  h+='<span style="font-size:11px;color:rgba(255,255,255,.45)">'+todayStr+'</span></div>';
  h+='<i id="checklistChevron" class="fas fa-chevron-'+(isOpen?'up':'down')+'" style="color:rgba(255,255,255,.45);font-size:11px"></i>';
  h+='</div>';
  h+='<div id="checklistBody" style="padding:10px 14px;display:'+(isOpen?'grid':'none')+';grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:6px">';
  items.forEach(function(item){
    h+='<div style="display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:7px;background:'+item.bg+'">';
    h+='<i class="fas '+(faMap[item.icon]||'fa-circle')+'" style="color:'+item.col+';font-size:13px;flex-shrink:0"></i>';
    h+='<span style="font-size:12px;color:var(--text)">'+item.text+'</span>';
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function toggleChecklist(){
  APP._checklistOpen=APP._checklistOpen===false;
  var body=document.getElementById('checklistBody');
  var chev=document.getElementById('checklistChevron');
  if(body)body.style.display=APP._checklistOpen?'grid':'none';
  if(chev)chev.className='fas fa-chevron-'+(APP._checklistOpen?'up':'down');
}

// ================================================================
// RENDER DASHBOARD
// ================================================================
function renderDashboard(){
  if(APP.currentView!=='dashboard')return;
  var data=APP.filteredData, cpo=APP.currentCPO||{};
  var html='';

  // MTD sync banner — extract last valid date from dateLabel (e.g. "MTD (2026-07-01 to 2026-07-17)")
  if(APP.currentPeriod==='mtd'&&APP.currentDateIdx===-1&&cpo&&cpo.dateLabel){
    var dlMatch=cpo.dateLabel.match(/to\s+(\d{4}-\d{2}-\d{2})/);
    if(dlMatch){
      var sd=dlMatch[1];
      html+='<div class="sync-banner"><i class="fas fa-info-circle"></i><span>Data updated till <strong>'+sd+'</strong> — only dates where both orders &amp; attendance are available are included.</span></div>';
    }
  }

  // KPIs
  var totalOrders=0,totalCost=0,totalLoaded=0,totalPickers=0,totalHours=0;
  data.forEach(function(r){totalOrders+=r.orders;totalCost+=r.pickerCost;totalLoaded+=r.loadedCost;totalPickers+=r.pickerCount;});
  var avgCPO=totalOrders>0?totalCost/totalOrders:0;
  var avgLoaded=totalOrders>0?totalLoaded/totalOrders:0;
  // UTR chain level = sum orders / sum(presentDays * hours) -- approximate from store UTRs
  var totalUTRNum=0,totalUTRDen=0;
  data.forEach(function(r){if(r.utr>0&&r.orders>0){totalUTRNum+=r.orders;totalUTRDen+=r.orders/r.utr;}});
  var chainUTR=totalUTRDen>0?totalUTRNum/totalUTRDen:0;

  // Today's checklist — only on MTD summary view
  if(APP.currentPeriod==='mtd'&&APP.currentDateIdx===-1)html+=buildChecklist();

  html+='<div style="margin-bottom:8px;font-size:12px;color:var(--muted)"><i class="fas fa-calendar-alt" style="margin-right:4px"></i>'+(cpo.dateLabel||'')+'</div>';
  html+='<div class="kpi-row">';
  html+='<div class="kpi"><span class="kpi-info"><i class="fas fa-info-circle"></i><div class="kpi-tooltip">Total number of orders picked across all stores in the selected period and filters.</div></span><div class="kpi-label">Total Orders</div><div class="kpi-value">'+fmt(totalOrders)+'</div><div class="kpi-sub">'+data.length+' stores · '+totalPickers+' pickers</div></div>';
  html+='<div class="kpi"><span class="kpi-info"><i class="fas fa-info-circle"></i><div class="kpi-tooltip">Total salary cost of pickers based on vendor rate ÷ working days × days present.<br><br>Loaded cost adds Champion + City Supervisor allocation per store.</div></span><div class="kpi-label">Total Picker Cost</div><div class="kpi-value">'+_getCurrency()+' '+fmt(Math.round(totalCost))+'</div><div class="kpi-sub">Loaded: '+_getCurrency()+' '+fmt(Math.round(totalLoaded))+'</div></div>';
  html+='<div class="kpi"><span class="kpi-info"><i class="fas fa-info-circle"></i><div class="kpi-tooltip"><strong>CPO Picker Only</strong><br>= Total Picker Cost ÷ Total Orders<br><br>How much it costs in picker salary to fulfil one order. Lower = better.</div></span><div class="kpi-label">CPO — Picker Only</div><div class="kpi-value" style="color:'+cpoColor(avgCPO)+'">'+_getCurrency()+' '+avgCPO.toFixed(2)+'</div><div class="kpi-sub">Picker cost per order</div></div>';
  html+='<div class="kpi"><span class="kpi-info"><i class="fas fa-info-circle"></i><div class="kpi-tooltip"><strong>CPO Full (Loaded)</strong><br>= (Picker Cost + Champion Alloc + Supervisor Alloc) ÷ Total Orders<br><br>Champion cost split equally across their stores. Supervisor cost split across all stores under their champions.</div></span><div class="kpi-label">CPO Full</div><div class="kpi-value" style="color:'+cpoColor(avgLoaded)+'">'+_getCurrency()+' '+avgLoaded.toFixed(2)+'</div><div class="kpi-sub">Picker+Champion+Supervisor</div></div>';
  html+='<div class="kpi"><span class="kpi-info"><i class="fas fa-info-circle"></i><div class="kpi-tooltip"><strong>UTR — Picker Utilization Rate</strong><br>= Total Orders ÷ (Total Days Present × Hours/Day)<br><br>How many orders a picker processes per hour worked. Higher = better productivity.<br><br>Example: 600 orders ÷ (12 days × 10 hrs) = 5.0 orders/hr</div></span><div class="kpi-label">UTR (orders/hr)</div><div class="kpi-value" style="color:var(--purple)">'+chainUTR.toFixed(1)+'</div><div class="kpi-sub">Picker Utilization Rate · chain level</div></div>';
  html+='</div>';

  // Table
  var cols=[
    {k:'vendorId',l:'Vendor ID',a:'left'},{k:'storeName',l:'Store',a:'left'},{k:'chain',l:'Chain',a:'left'},
    {k:'city',l:'City',a:'left'},{k:'dept3pl',l:'3PL',a:'left'},{k:'supervisor',l:'Supervisor',a:'left'},
    {k:'champion',l:'Champion',a:'left'},{k:'pickerCount',l:'Pickers',a:'right'},
    {k:'orders',l:'Orders',a:'right'},{k:'presentDays',l:'Present Days',a:'right'},
    {k:'pickerCost',l:'Picker Cost',a:'right'},{k:'pickerCPO',l:'CPO Picker',a:'right'},
    {k:'loadedCPO',l:'CPO Full',a:'right'},{k:'utr',l:'UTR (ord/hr)',a:'right'}
  ];
  html+='<div class="table-wrap"><div class="table-toolbar">';
  html+='<input class="search-input" id="searchInput" placeholder="Search stores..." oninput="applyFilters()">';
  html+='<div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;color:var(--muted)">'+data.length+' stores</span>';
  html+='<button class="btn btn-sm btn-outline" onclick="exportCSV()"><i class="fas fa-download"></i> Export</button></div>';
  html+='</div><div class="tbl-scroll"><table><thead><tr>';
  cols.forEach(function(c){
    var sorted=APP.sortCol===c.k;
    html+='<th onclick="onSort(\''+c.k+'\')" class="'+(sorted?'sorted':'')+'" style="text-align:'+c.a+'">'+c.l+' <span style="opacity:.5;font-size:9px">'+(sorted?(APP.sortAsc?'▲':'▼'):'⇅')+'</span></th>';
  });
  html+='</tr></thead><tbody>';
  if(!data.length)html+='<tr><td colspan="'+cols.length+'" style="text-align:center;padding:40px;color:var(--muted)">No data matches filters</td></tr>';
  var _actThr=(APP.optimizerConfig||{}).actionThreshold||4.0;
  var _critThr=(APP.optimizerConfig||{}).criticalThreshold||20.0;
  data.forEach(function(r){
    var isCrit=r.pickerCPO>_critThr, isAction=r.pickerCPO>_actThr&&r.pickerCPO<=_critThr;
    var rowStyle=isCrit?'background:#fff1f2':isAction?'background:#fff7ed':'';
    var flag=isCrit
      ?'<span title="Critical CPO > '+_critThr+' '+_getCurrency()+'" style="color:var(--danger);margin-right:5px"><i class="fas fa-times-circle"></i></span>'
      :isAction
      ?'<span title="Review CPO > '+_actThr+' '+_getCurrency()+'" style="color:#ea580c;margin-right:5px"><i class="fas fa-exclamation-circle"></i></span>'
      :'';
    var missingAtt=r.orders>0&&r.pickerCount===0
      ?'<span title="Missing attendance data" style="color:var(--warning);margin-left:4px"><i class="fas fa-exclamation-triangle"></i></span>':'' ;
    html+='<tr'+(rowStyle?' style="'+rowStyle+'"':'')+' >';
    html+='<td>'+flag+r.vendorId+'</td><td>'+r.storeName+missingAtt+'</td><td>'+r.chain+'</td><td>'+r.city+'</td>';
    html+='<td>'+r.dept3pl+'</td><td>'+r.supervisor+'</td><td>'+r.champion+'</td>';
    var ri=r.relieverInfo||{};
    var permCount=ri.regularPickerCount>0?ri.regularPickerCount:(r.maxDailyPickers||r.pickerCount);
    var relCount=ri.hasReliever?ri.relieverCount:0;
    var pickerCell=relCount>0
      ?'<span title="'+permCount+' permanent + '+relCount+' reliever">'+permCount+'<span style="color:#ea580c;font-size:10px;font-weight:700"> +'+relCount+'r</span></span>'
      :String(r.pickerCount);
    html+='<td style="text-align:right">'+pickerCell+'</td>';
    html+='<td style="text-align:right;font-weight:600">'+fmt(r.orders)+'</td>';
    html+='<td style="text-align:right">'+r.presentDays+'</td>';
    html+='<td style="text-align:right">'+_getCurrency()+' '+fmt(r.pickerCost)+'</td>';
    html+='<td style="text-align:right"><span class="badge '+cpoCls(r.pickerCPO)+'">'+_getCurrency()+' '+r.pickerCPO.toFixed(2)+'</span></td>';
    html+='<td style="text-align:right"><span class="badge '+cpoCls(r.loadedCPO)+'">'+_getCurrency()+' '+r.loadedCPO.toFixed(2)+'</span></td>';
    html+='<td style="text-align:right"><span class="badge utr-badge">'+(r.utr?r.utr.toFixed(1):'—')+'</span></td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  document.getElementById('mainContent').innerHTML=html;
}

function exportCSV(){
  var data=APP.filteredData,cpo=APP.currentCPO||{};
  var cols=['vendorId','storeName','chain','city','dept3pl','supervisor','champion','pickerCount','orders','presentDays','pickerCost','pickerCPO','loadedCost','loadedCPO','utr'];
  var hdrs=['Vendor ID','Store','Chain','City','3PL','Supervisor','Champion','Pickers','Orders','Present Days','Picker Cost','CPO Picker','Loaded Cost','CPO Full','UTR'];
  var csv=hdrs.join(',')+'\n';
  data.forEach(function(r){csv+=cols.map(function(c){var v=r[c];return typeof v==='string'?'"'+v.replace(/"/g,'""')+'"':(v!=null?v:0);}).join(',')+'\n';});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='CPO_'+(cpo.dateLabel||'').replace(/[^a-zA-Z0-9]/g,'_')+'.csv';
  a.click();
}

// ================================================================
// HISTORICAL & TRENDS VIEW — proper selector-first approach
// ================================================================
function renderHistoricalView(){
  // Build chain and store lists — use APP.masterData (ALL stores, from master sheet)
  var chains={}, stores={};
  // Primary source: master data (complete store list, always loaded at startup)
  if(APP.masterData){
    Object.keys(APP.masterData).forEach(function(vid){
      var m=APP.masterData[vid];
      if(m.chainName)chains[m.chainName]=1;
      if(m.storeName)stores[vid]={name:m.storeName,chain:m.chainName||''};
    });
  }
  // Supplement from APP.allData and cache (adds any stores not in master)
  if(APP.allData&&APP.allData.length){
    APP.allData.forEach(function(r){

  html+='<div style="padding:10px 10px 6px"><input id="tStoreSearch" placeholder="🔍 Search stores..." oninput="filterStoreList()" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;box-sizing:border-box"></div>';

  sortedVids.forEach(function(vid){

    html+='<input type="checkbox" class="store-cb" value="'+vid+'" onchange="onStoreCbChange()" checked style="width:14px;height:14px;accent-color:var(--primary);cursor:pointer;vertical-align:middle;margin-right:8px;flex-shrink:0">';
    html+=stores[vid].name+'</label>';

  html+='<button onclick="toggleAllStores({checked:true})" style="flex:1;padding:5px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;background:var(--card)">Select All</button>';
  html+='<button onclick="toggleAllStores({checked:false})" style="flex:1;padding:5px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;background:var(--card)">Clear All</button>';
  html+='<button onclick="document.getElementById(\'tStoreDropdown\').style.display=\'none\'" style="flex:1;padding:5px;border:none;border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;background:var(--primary);color:#fff">Done</button>';
  html+='</div></div></div>';

  // Date From / To

  var nowDate=_now.getFullYear()+'-'+((_now.getMonth()+1)<10?'0':'')+((_now.getMonth()+1))+'-'+(_now.getDate()<10?'0':'')+_now.getDate();
  if(trendView==='weekly'){

  } else if(trendView==='monthly'){

    archived.forEach(function(a){if(a.label<=nowYM)dateOpts+='<option value="ar_'+a.fileId+'">'+a.label+'</option>';});
  } else {

  html+='<div class="fg"><label>From</label><select id="tFrom">'+dateOpts+'</select></div>';
  html+='<div class="fg"><label>To</label><select id="tTo">'+dateOpts+'</select></div>';

  html+='<div><button class="btn btn-primary" onclick="calculateTrend()"><i class="fas fa-play"></i> Calculate</button></div>';
  html+='</div>'; // end controls

  // Default To = last option (already filtered to current month max)
  html+='<script>setTimeout(function(){var t=document.getElementById("tTo");if(t&&t.options.length>0)t.selectedIndex=t.options.length-1;},50);<\/script>';

  html+='<div id="trendChartArea" style="margin-bottom:16px"></div>';

  html+='</div>';

function onTrendStoreInput(){ APP._selectedStoreVid=null; }

function toggleStoreDropdown(e){

  var open=dd.style.display==='flex';
  dd.style.display=open?'none':'flex';
  dd.style.flexDirection='column';

// Close on outside click
document.addEventListener('click',function(e){
  var dd=document.getElementById('tStoreDropdown');
  var box=document.getElementById('tStoreBox');
  if(dd&&box&&!dd.contains(e.target)&&e.target!==box)dd.style.display='none';
});
function filterStoreList(){
  var q=(document.getElementById('tStoreSearch').value||'').toLowerCase();
  var chain=document.getElementById('tChain')?document.getElementById('tChain').value:'';
  document.querySelectorAll('#tStoreList .store-opt').forEach(function(el){
    var chainMatch=!chain||el.getAttribute('data-chain')===chain;
    var textMatch=!q||el.textContent.toLowerCase().indexOf(q)>=0;
    el.style.display=(chainMatch&&textMatch)?'block':'none';
  });
}
function toggleAllStores(cb){
  document.querySelectorAll('#tStoreList .store-cb').forEach(function(c){c.checked=cb.checked;});
  updateStoreLabel();
}
function onStoreCbChange(){
  var all=document.querySelectorAll('#tStoreList .store-cb');
  var checked=document.querySelectorAll('#tStoreList .store-cb:checked');
  var allCb=document.getElementById('tStoreAll');
  if(allCb)allCb.checked=(checked.length===all.length);
  updateStoreLabel();
}
function updateStoreLabel(){
  var checked=document.querySelectorAll('#tStoreList .store-cb:checked');
  var lbl=document.getElementById('tStoreLabel');
  if(!lbl)return;
  if(checked.length===0||checked.length===document.querySelectorAll('#tStoreList .store-cb').length){
    lbl.textContent='All Stores';
  } else if(checked.length===1){
    lbl.textContent=checked[0].closest('label').textContent.trim();
  } else {
    lbl.textContent=checked.length+' stores selected';
  }
}
function getSelectedStores(){
  var chain=document.getElementById('tChain')?document.getElementById('tChain').value:'';
  var checked=document.querySelectorAll('#tStoreList .store-cb:checked');
  var visible=document.querySelectorAll('#tStoreList .store-opt[style*="flex"] .store-cb, #tStoreList .store-opt:not([style*="none"]) .store-cb');
  // If all visible stores are checked and no chain filter → means "all", return []
  if(!chain&&checked.length===document.querySelectorAll('#tStoreList .store-cb').length)return[];
  // If all visible (chain-filtered) stores are checked → filter by chain only, return []
  if(chain&&checked.length>=visible.length)return[];
  return Array.prototype.map.call(checked,function(c){return c.value;});
}

function onTrendChainChange(){
  var chain=document.getElementById('tChain').value;
  var list=document.getElementById('tStoreList'); if(!list)return;
  // Show only stores matching the selected chain; hide others
  list.querySelectorAll('.store-opt').forEach(function(el){
    var match=!chain||el.getAttribute('data-chain')===chain;
    el.style.display=match?'block':'none';
    // Check all visible, uncheck hidden
    var cb=el.querySelector('.store-cb');
    if(cb)cb.checked=match;
  });
  var allCb=document.getElementById('tStoreAll');
  if(allCb)allCb.checked=true;
  updateStoreLabel();
}

function calculateTrend(){
  var trendView=APP.trendView||'weekly';
  var chain=document.getElementById('tChain').value;
  var selectedStores=getSelectedStores(); // [] means all stores
  var fromVal=document.getElementById('tFrom').value;
  var toVal=document.getElementById('tTo').value;
  var type=document.getElementById('tType').value;

  var ca=document.getElementById('trendChartArea');
  var ta=document.getElementById('trendTableArea');
  if(!ca)return;
  ca.innerHTML='<div class="loading" style="padding:30px"><div class="spinner"></div><div style="font-size:12px;color:var(--muted);margin-top:8px">Calculating trend...</div></div>';

  // Collect needed data points — check cache first, fetch missing ones
  var points=[];
  var toFetch=[]; // [{period,dateIndex,label,key}]

  function buildPoints(period,dateArr){
    var fromIdx=parseInt(fromVal)||0;
    var toIdx=parseInt(toVal)||dateArr.length-1;
    if(toIdx<fromIdx){var tmp=toIdx;toIdx=fromIdx;fromIdx=tmp;}
    for(var i=fromIdx;i<=toIdx&&i<dateArr.length;i++){
      var key=period+'_'+i+'_'+type;
      var lbl=dateArr[i]; if(lbl.length>=10)lbl=lbl.substring(0,10);
      if(APP.cache&&APP.cache[key]){
        points.push({label:lbl,data:APP.cache[key],key:key});
      } else {
        toFetch.push({period:period,dateIndex:i,label:lbl,key:key});
      }
    }
  }

  if(trendView==='daily'){
    var dDates=APP.periodsData.mtd?APP.periodsData.mtd.orderDates||[]:[];
    buildPoints('mtd',dDates);
  } else if(trendView==='weekly'){
    var wDates=APP.periodsData.weekly?APP.periodsData.weekly.orderDates||[]:[];
    buildPoints('weekly',wDates);
  } else {
    // Monthly — includes both cached monthly and archives
    var mDates=APP.periodsData.monthly?APP.periodsData.monthly.orderDates||[]:[];
    var fromV=fromVal, toV=toVal;
    // Handle monthly indices (mo_N) and archive (ar_fileId)
    var allMoPts=[];
    var _now3=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Dubai'}));
    var todayYMLocal=_now3.getFullYear()+'-'+((_now3.getMonth()+1)<10?'0':'')+((_now3.getMonth()+1));
    mDates.forEach(function(d,i){
      if(d.substring(0,7)<=todayYMLocal)
        allMoPts.push({type:'live',idx:i,label:d.substring(0,7)});
    });
    (APP.periodsData.archivedMonths||[]).forEach(function(a){allMoPts.push({type:'arch',fileId:a.fileId,label:a.label});});
    // Filter by from/to label range
    var labels=allMoPts.map(function(p){return p.label;});
    var fromLabel=fromV.replace('mo_','').replace('ar_','');
    var toLabel=toV.replace('mo_','').replace('ar_','');
    var fIdx=Math.max(0,labels.indexOf(fromLabel));
    var tIdx=labels.indexOf(toLabel); if(tIdx<0)tIdx=labels.length-1;
    if(tIdx<fIdx){var tmp2=tIdx;tIdx=fIdx;fIdx=tmp2;}
    for(var mi=fIdx;mi<=tIdx;mi++){
      var mp=allMoPts[mi];
      if(mp.type==='live'){
        var key='monthly_'+mp.idx+'_'+type;
        if(APP.cache&&APP.cache[key])points.push({label:mp.label,data:APP.cache[key],key:key});
        else toFetch.push({period:'monthly',dateIndex:mp.idx,label:mp.label,key:key});
      } else {
        var aKey='arch_'+mp.fileId+'_'+type;
        if(APP.cache&&APP.cache[aKey])points.push({label:mp.label,data:APP.cache[aKey],key:aKey});
        else toFetch.push({period:'archive',fileId:mp.fileId,label:mp.label,key:aKey});
      }
    }
  }

  // Fetch missing data points sequentially then render
  // Remove any toFetch items that are clearly future/empty (label > today's month)
  var _now2=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Dubai'}));
  var todayYM=_now2.getFullYear()+'-'+((_now2.getMonth()+1)<10?'0':'')+((_now2.getMonth()+1));
  var todayDate=todayYM+'-'+(_now2.getDate()<10?'0':'')+_now2.getDate();
  toFetch=toFetch.filter(function(tf){
    if(tf.period==='archive')return true;
    var lbl=tf.label?tf.label.substring(0,10):'';
    if(lbl.length===7)return lbl<=todayYM;
    return lbl<=todayDate;
  });

  function fetchNext(idx){
    if(idx>=toFetch.length){
      var allPts=points.concat([]).sort(function(a,b){return a.label.localeCompare(b.label);});
      APP._trendData={pts:allPts,chain:chain,stores:selectedStores,trendView:trendView};
      renderTrendChart(APP._trendData);
      renderTrendTable(APP._trendData);
      return;
    }
    var tf=toFetch[idx];
    if(tf.period==='archive'){
      google.script.run.withSuccessHandler(function(r){
        if(!r.error){if(!APP.cache)APP.cache={};APP.cache[tf.key]=r;points.push({label:tf.label,data:r,key:tf.key});}
        fetchNext(idx+1);
      }).computeCPOFromArchive(tf.fileId,[type]);
    } else {
      google.script.run.withSuccessHandler(function(r){
        if(!r.error){if(!APP.cache)APP.cache={};APP.cache[tf.key]=r;points.push({label:tf.label,data:r,key:tf.key});}
        fetchNext(idx+1);
      }).getCPOData(tf.period,tf.dateIndex,[type]);
    }
  }
  fetchNext(0);
}

function renderTrendChart(trendData){
  var ca=document.getElementById('trendChartArea'); if(!ca)return;
  var pts=trendData.pts, chain=trendData.chain, stores=trendData.stores||[];
  var metric=APP.histMetric||'both';

  // Build active filter badge
  var filterBadge='';
  if(chain)filterBadge+='<span style="background:var(--primary);color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;margin-right:6px"><i class="fas fa-store" style="margin-right:3px"></i>'+chain+'</span>';
  if(stores.length>0){
    // Get store names from checkboxes
    var names=[];
    document.querySelectorAll('#tStoreList .store-cb:checked').forEach(function(cb){
      var lbl=cb.closest('label'); if(lbl)names.push(lbl.textContent.trim());
    });
    var label=names.length===1?names[0]:names.length+' stores';
    filterBadge+='<span style="background:#411517;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;margin-right:4px">'+label+'</span>';
  }

  var labels=[], cpoLine=[], utrLine=[];
  pts.forEach(function(p){
    if(!p.data||p.data.error)return;
    var rows=p.data.data||[];
    rows=rows.filter(function(r){
      if(chain&&r.chain!==chain)return false;
      if(stores.length>0&&stores.indexOf(r.vendorId)<0)return false;
      return true;
    });
    var to=0,tc=0,uN=0,uD=0;
    rows.forEach(function(r){
      to+=r.orders;tc+=r.pickerCost;
      if(r.utr>0&&r.orders>0){uN+=r.orders;uD+=r.orders/r.utr;}
    });
    labels.push(p.label);
    cpoLine.push(to>0?Math.round(tc/to*100)/100:null);
    utrLine.push(uD>0?Math.round(uN/uD*10)/10:null);
  });

  if(!labels.length){ca.innerHTML='<div class="chart-wrap"><p style="color:var(--muted);font-size:13px;padding:12px">No data found for selection. Try computing dates in Dashboard first.</p></div>';return;}

  var filterRow=filterBadge?'<div style="margin-bottom:8px">'+filterBadge+'</div>':'';
  ca.innerHTML='<div class="chart-wrap">'+filterRow+'<canvas id="mainTrendChart" style="max-height:300px"></canvas></div>';
  if(APP._mainTrendChart)APP._mainTrendChart.destroy();
  var ctx=document.getElementById('mainTrendChart').getContext('2d');
  var showCPO=metric==='cpo'||metric==='both';
  var showUTR=metric==='utr'||metric==='both';
  var dual=showCPO&&showUTR;

  // Y-axis scale: min 0, step 10, max rounds up to nearest 10 above highest value
  function smartAxis(values){
    var max=0;
    values.forEach(function(v){if(v!=null&&v>max)max=v;});
    var topN=max<=10?10:Math.ceil(max/10)*10;
    if(topN===max)topN+=10; // ensure highest point isn't at the very top
    return{min:0,max:topN,ticks:{stepSize:10}};
  }
  var cpoAxis=smartAxis(cpoLine);
  var utrAxis=smartAxis(utrLine);

  var ds=[];
  if(showCPO)ds.push({label:'CPO (AED)',data:cpoLine,borderColor:'#FF5A00',backgroundColor:'rgba(255,90,0,.1)',tension:.3,fill:showUTR?false:true,yAxisID:'y',spanGaps:true,pointRadius:5,pointHoverRadius:7,
    datalabels:{anchor:'end',align:'top',color:'#FF5A00',font:{size:10,weight:'600'},formatter:function(v){return v!=null?v.toFixed(2):'';}},
  });
  if(showUTR)ds.push({label:'UTR (ord/hr)',data:utrLine,borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.08)',tension:.3,fill:false,yAxisID:dual?'y1':'y',spanGaps:true,pointRadius:5,pointHoverRadius:7,
    datalabels:{anchor:'end',align:'top',color:'#7c3aed',font:{size:10,weight:'600'},formatter:function(v){return v!=null?v.toFixed(1):'';}},
  });
  var scales={y:{type:'linear',position:'left',min:cpoAxis.min,max:cpoAxis.max,ticks:{stepSize:cpoAxis.ticks.stepSize},title:{display:true,text:showUTR&&!showCPO?'UTR (ord/hr)':'CPO (AED)'}}};
  if(dual)scales.y1={type:'linear',position:'right',min:utrAxis.min,max:utrAxis.max,ticks:{stepSize:utrAxis.ticks.stepSize},title:{display:true,text:'UTR (ord/hr)'},grid:{drawOnChartArea:false}};

  // Register datalabels plugin inline (CDN-free fallback: draw labels after chart)
  APP._mainTrendChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:ds},options:{
    responsive:true,
    plugins:{
      legend:{position:'top'},
      tooltip:{callbacks:{title:function(items){return items[0].label;}}},
      datalabels:{display:false} // disable Chart.js datalabels plugin if not loaded
    },
    scales:scales,
    animation:{onComplete:function(){
      // Draw labels manually after render
      var chart=this;
      var chartCtx=chart.ctx;
      chartCtx.save();
      chart.data.datasets.forEach(function(ds,di){
        var meta=chart.getDatasetMeta(di);
        if(meta.hidden)return;
        var color=ds.borderColor;
        chartCtx.fillStyle=color;
        chartCtx.font='bold 10px Poppins,sans-serif';
        chartCtx.textAlign='center';
        meta.data.forEach(function(pt,i){
          var val=ds.data[i];
          if(val==null)return;
          var label=di===0?(val.toFixed?val.toFixed(2):val):(val.toFixed?val.toFixed(1):val);
          chartCtx.fillText(label,pt.x,pt.y-10);
        });
      });
      chartCtx.restore();
    }}
  }});
}

function renderTrendTable(trendData){
  var ta=document.getElementById('trendTableArea'); if(!ta)return;
  var pts=trendData.pts, chain=trendData.chain, stores=trendData.stores||[];
  var h='<div class="table-wrap"><div class="table-toolbar"><span style="font-size:12px;font-weight:600;color:var(--dark)">Trend Data</span><button class="btn btn-sm btn-outline" onclick="exportTrendCSV()"><i class="fas fa-download"></i> Export</button></div>';
  h+='<div class="tbl-scroll"><table><thead><tr>';
  h+='<th>Period</th><th style="text-align:right">Orders</th><th style="text-align:right">Picker Cost</th>';
  h+='<th style="text-align:right">CPO (AED)</th><th style="text-align:right">CPO Δ%</th>';
  h+='<th style="text-align:right">UTR (ord/hr)</th><th style="text-align:right">UTR Δ%</th></tr></thead><tbody>';
  APP._trendTableRows=[];
  var prevCPO=null, prevUTR=null;
  pts.forEach(function(p){
    if(!p.data||p.data.error)return;
    var rows=(p.data.data||[]).filter(function(r){
      if(chain&&r.chain!==chain)return false;
      if(stores.length>0&&stores.indexOf(r.vendorId)<0)return false;
      return true;
    });
    var to=0,tc=0,uN=0,uD=0;
    rows.forEach(function(r){to+=r.orders;tc+=r.pickerCost;if(r.utr>0&&r.orders>0){uN+=r.orders;uD+=r.orders/r.utr;}});
    var cpo=to>0?Math.round(tc/to*100)/100:0;
    var utr=uD>0?Math.round(uN/uD*10)/10:0;
    // % change
    var cpoPct=null, utrPct=null;
    if(prevCPO!==null&&prevCPO>0)cpoPct=Math.round((cpo-prevCPO)/prevCPO*1000)/10;
    if(prevUTR!==null&&prevUTR>0)utrPct=Math.round((utr-prevUTR)/prevUTR*1000)/10;
    prevCPO=cpo; prevUTR=utr;
    function pctBadge(pct,lower_is_better){
      if(pct===null)return'<span style="color:var(--muted);font-size:11px">—</span>';
      var good=(lower_is_better?pct<0:pct>0);
      var color=good?'var(--success)':pct===0?'var(--muted)':'var(--danger)';
      var arrow=pct>0?'▲':pct<0?'▼':'=';
      return'<span style="color:'+color+';font-weight:600;font-size:11px">'+arrow+' '+Math.abs(pct).toFixed(1)+'%</span>';
    }
    if(to===0&&tc===0)return; // skip completely empty periods
    APP._trendTableRows.push({period:p.label,orders:to,cost:Math.round(tc),cpo:cpo,utr:utr,cpoPct:cpoPct,utrPct:utrPct});
    h+='<tr><td>'+p.label+'</td><td style="text-align:right;font-weight:600">'+fmt(to)+'</td>';
    h+='<td style="text-align:right">'+_getCurrency()+' '+fmt(Math.round(tc))+'</td>';
    h+='<td style="text-align:right"><span class="badge '+cpoCls(cpo)+'">'+_getCurrency()+' '+cpo.toFixed(2)+'</span></td>';
    h+='<td style="text-align:right">'+pctBadge(cpoPct,true)+'</td>';
    h+='<td style="text-align:right"><span class="badge utr-badge">'+utr.toFixed(1)+'</span></td>';
    h+='<td style="text-align:right">'+pctBadge(utrPct,false)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  ta.innerHTML=h;
}

function exportTrendCSV(){
  var rows=APP._trendTableRows||[];
  var csv='Period,Orders,Picker Cost,CPO (AED),CPO Delta%,UTR (ord/hr),UTR Delta%\n';
  rows.forEach(function(r){csv+=r.period+','+r.orders+','+r.cost+','+r.cpo+','+(r.cpoPct!=null?r.cpoPct:'')+','+r.utr+','+(r.utrPct!=null?r.utrPct:'')+'\n';});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='CPO_Trend.csv';a.click();
}

function loadHistoricalData(){
  if(!APP.histSelectedIds.length){showToast('Select at least one month','error');return;}
  document.getElementById('histTableWrap').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  var types=document.getElementById('fType').value.split(',');
  google.script.run.withSuccessHandler(function(results){

    renderHistChart();renderHistTable();
    showToast('Loaded '+results.length+' month(s)','success');
  }).withFailureHandler(function(e){showToast('Error: '+e.message,'error');})
    .getHistoricalData(APP.histSelectedIds,types);
