function getHistFiltered(){
  var chain=(document.getElementById('hfChain')||{}).value||'';
  var sup=(document.getElementById('hfSup')||{}).value||'';
  var filtered=[];
  APP.histData.forEach(function(monthResult){
    var rows=monthResult.data.filter(function(r){
      if(chain&&r.chain!==chain)return false;
      if(sup&&r.supervisor!==sup)return false;
      return true;
    });
    filtered.push({label:monthResult.dateLabel||monthResult.period,rows:rows,month:monthResult.month,year:monthResult.year});
  });
  return filtered;
}

function renderHistChart(){
  var wrap=document.getElementById('histChartWrap');
  if(!wrap)return;
  var type=document.getElementById('fType')?document.getElementById('fType').value:'Picker';
  var chain=(document.getElementById('hfChain')||{}).value||'';
  var sup=(document.getElementById('hfSup')||{}).value||'';

  // Helper: aggregate rows to one CPO+UTR point
  function agg(rows){
    var to=0,tc=0,uN=0,uD=0;
    rows.forEach(function(r){
      to+=r.orders;tc+=r.pickerCost;
      if(r.utr>0&&r.orders>0){uN+=r.orders;uD+=r.orders/r.utr;}
    });
    return{cpo:to>0?Math.round(tc/to*10)/10:null, utr:uD>0?Math.round(uN/uD*10)/10:null};
  }

  // Helper: extract points from cache for a given period
  function getPoints(period){
    var pts=[];
    var dates=APP.periodsData[period]?APP.periodsData[period].orderDates||[]:[];
    for(var i=0;i<dates.length;i++){
      var d=APP.cache[period+'_'+i+'_'+type];
      if(!d||d.error)continue;
      var rows=d.data.filter(function(r){
        if(chain&&r.chain!==chain)return false;
        if(sup&&r.supervisor!==sup)return false;
        return true;
      });
      var a=agg(rows);
      if(a.cpo!==null||a.utr!==null){
        var lbl=dates[i]; if(lbl.length>=10)lbl=lbl.substring(0,10);
        pts.push({label:lbl,cpo:a.cpo,utr:a.utr});
      }
    }
    return pts;
  }

  // Also for MTD daily (period=mtd, has individual date indices)
  var dailyPts=getPoints('mtd');
  var weeklyPts=getPoints('weekly');
  var monthlyPts=getPoints('monthly');

  // Historical archive months
  var filtered=getHistFiltered();
  var archPts=filtered.map(function(m){
    var a=agg(m.rows);
    return{label:m.label,cpo:a.cpo,utr:a.utr};
  });

  var html='<div style="padding:0 4px">';

  // Build chart sections
  function makeChartHtml(id,title,hint){
    return '<div class="chart-wrap" style="margin-bottom:16px">'+
      '<div style="font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px">'+
      '<i class="fas fa-chart-line" style="color:var(--primary);margin-right:6px"></i>'+title+
      (hint?'<span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:8px">'+hint+'</span>':'')+
      '</div><canvas id="'+id+'" style="max-height:240px"></canvas></div>';
  }
  function makeEmptyHtml(title,hint){
    return '<div class="chart-wrap" style="margin-bottom:16px;padding:16px 20px">'+
      '<div style="font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px">'+title+'</div>'+
      '<p style="font-size:12px;color:var(--muted)">'+hint+'</p></div>';
  }

  html+=dailyPts.length>0?makeChartHtml('tcDaily','Daily Trend (Day over Day)','from computed daily dates'):
    makeEmptyHtml('Daily Trend','Go to Dashboard → Daily, compute dates — trend appears here automatically.');

  html+=weeklyPts.length>1?makeChartHtml('tcWeekly','Weekly Trend (Week over Week)','from computed weekly dates'):
    makeEmptyHtml('Weekly Trend','Go to Dashboard → Weekly, compute 2+ weeks to see the trend.');

  html+=monthlyPts.length>1?makeChartHtml('tcMonthly','Monthly Trend (Month over Month)','from computed monthly dates'):
    makeEmptyHtml('Monthly Trend','Go to Dashboard → Monthly, compute 2+ months to see the trend.');

  html+=archPts.length>1?makeChartHtml('tcArchive','Archived Month Comparison'):'';
  html+='</div>';
  wrap.innerHTML=html;

  // Render helper
  function drawChart(canvasId,pts,cpoKey,utrKey){
    var el=document.getElementById(canvasId); if(!el)return;
    if(APP['_chart_'+canvasId])APP['_chart_'+canvasId].destroy();
    var ds=[];
    var showCPO=APP.histMetric==='cpo'||APP.histMetric==='both';
    var showUTR=APP.histMetric==='utr'||APP.histMetric==='both';
    var dualAxis=showCPO&&showUTR;
    if(showCPO)ds.push({label:'CPO (AED)',data:pts.map(function(p){return p[cpoKey];}),borderColor:'#FF5A00',backgroundColor:'rgba(255,90,0,.08)',tension:.3,fill:false,yAxisID:'y',spanGaps:true});
    if(showUTR)ds.push({label:'UTR (ord/hr)',data:pts.map(function(p){return p[utrKey];}),borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.06)',tension:.3,fill:false,yAxisID:dualAxis?'y1':'y',spanGaps:true});
    var scales={y:{type:'linear',position:'left',title:{display:true,text:showUTR&&!showCPO?'UTR':'CPO (AED)'}}};
    if(dualAxis)scales.y1={type:'linear',position:'right',title:{display:true,text:'UTR (ord/hr)'},grid:{drawOnChartArea:false}};
    APP['_chart_'+canvasId]=new Chart(el.getContext('2d'),{type:'line',
      data:{labels:pts.map(function(p){return p.label;}),datasets:ds},
      options:{responsive:true,plugins:{legend:{position:'top'}},scales:scales}
    });
  }

  if(dailyPts.length>0)  drawChart('tcDaily',   dailyPts,  'cpo','utr');
  if(weeklyPts.length>1) drawChart('tcWeekly',  weeklyPts, 'cpo','utr');
  if(monthlyPts.length>1)drawChart('tcMonthly', monthlyPts,'cpo','utr');
  if(archPts.length>1)   drawChart('tcArchive', archPts,   'cpo','utr');
}

// ================================================================
// COST OPTIMIZER
// ================================================================
function haversineKm(lat1,lng1,lat2,lng2){
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getNearestSameChain(store){
  var master=APP.masterData||{};
  var m=master[store.vendorId]; if(!m||!m.lat||!m.lng)return null;
  var cfg=APP.optimizerConfig||{};
  var maxKm=cfg.proximityRadiusKm||5;
  var best=null, bestKm=Infinity;
  Object.keys(master).forEach(function(vid){
    if(vid===store.vendorId)return;
    var n=master[vid];
    if(!n.lat||!n.lng)return;
    if((n.chainName||'').toLowerCase()!==(store.chain||'').toLowerCase())return;
    var km=haversineKm(m.lat,m.lng,n.lat,n.lng);
    if(km<maxKm&&km<bestKm){bestKm=km;best={storeName:n.storeName,vendorId:vid,km:Math.round(km*10)/10,minDrive:Math.round(km/30*60)};}
  });
  return best;
}

function calcOvertimeScenario(store){
  var cfg=APP.optimizerConfig||{};
  var ri=store.relieverInfo||{};
  if(!ri.hasReliever)return null;
  var rates=APP.config.vendor_rates||[];
  var dept=(store.dept3pl||'').split(',')[0].trim();
  var vendorCfg=null;
  for(var i=0;i<rates.length;i++){if(rates[i].vendorName===dept||rates[i].vendorName.toLowerCase()===dept.toLowerCase()){vendorCfg=rates[i];break;}}
  var monthRate=vendorCfg?vendorCfg.baseRate:2750;
  var contractHrs=vendorCfg?vendorCfg.hoursPerDay||10:10;
  var otMult=cfg.otMultiplier||1.5;
  var wDays=ri.workDays||26;
  var si=_getSyncInfo(wDays);
  var regularPickers=ri.regularPickerCount||2;
  var edgeThr=cfg.edgeOrderThreshold||1.0;
  var edgeGMV=cfg.edgeGMVThreshold||50;
  var weekdayOnly=cfg.weekdayDayOffOnly!==0; // default true

  // Get store timing from Sheet3
  var timing=_getStoreTiming(store.vendorId);
  var hourlyOT=_getStoreHourly(store.vendorId);
  var gmvData=_getStoreHourlyGMV(store.vendorId);
  var maxHourlyOrders=0;
  if(hourlyOT){for(var h=0;h<24;h++){var hv=hourlyOT[h]||0;if(hv>maxHourlyOrders)maxHourlyOrders=hv;}}

  // Store open/close from Sheet3; fallback to hourly active hours
  var rawStoreHrs=0,snappedOpen=8,snappedClose=22,adjOpen=8,adjClose=22;
  var trimStart=[],trimEnd=[];
  if(timing){
    rawStoreHrs=timing.duration;
    snappedOpen=_snapHalf(timing.openHr,'up');
    snappedClose=_snapHalf(timing.closeHr,'down');
    var trimmed=_trimEdgeHours(snappedOpen,snappedClose,hourlyOT,gmvData,edgeThr,edgeGMV);
    adjOpen=trimmed.open; adjClose=trimmed.close;
    trimStart=trimmed.trimStart; trimEnd=trimmed.trimEnd;
  } else if(hourlyOT){
    // fallback: count hours with orders > 0
    var activeStart=-1,activeEnd=-1;
    for(var h2=0;h2<24;h2++){if(hourlyOT[h2]>0){if(activeStart<0)activeStart=h2;activeEnd=h2;}}
    if(activeStart>=0){snappedOpen=adjOpen=activeStart;snappedClose=adjClose=activeEnd+1;rawStoreHrs=adjClose-adjOpen;}
  }
  var adjStoreHrs=adjClose-adjOpen;
  var totalShiftHrs=contractHrs+1; // contract hrs work + 1 hr break
  var otHrs=adjStoreHrs>0?Math.max(0,Math.round((adjStoreHrs-totalShiftHrs)*2)/2):0;

  // Day-off rate: 1 per 6 working days; weekday-only means exclude weekends
  var effectiveWDays=weekdayOnly?_weekdaysOnly(wDays):wDays;
  var effectiveRemaining=weekdayOnly?_weekdaysOnly(si.remainingWorkDays):si.remainingWorkDays;
  var effectiveMTD=weekdayOnly?_weekdaysOnly(si.syncDay||0):(si.syncDay||0);
  var dayOffRate=1/6;
  var eventsFullMonth=regularPickers*effectiveWDays*dayOffRate;
  var eventsRemaining=regularPickers*effectiveRemaining*dayOffRate;
  var eventsMTD=regularPickers*effectiveMTD*dayOffRate;

  var hourlyRate=(monthRate/wDays)/contractHrs;
  var otCostPerEvent=otHrs*hourlyRate*otMult;
  var relieverDailyRate=monthRate/wDays;
  var savingPerEvent=relieverDailyRate-otCostPerEvent;

  var relieverCostFullMonth=Math.round(eventsFullMonth*relieverDailyRate);
  var relieverCostRemaining=Math.round(eventsRemaining*relieverDailyRate);
  var relieverCostMTD=Math.round(eventsMTD*relieverDailyRate);
  var otCostFullMonth=Math.round(eventsFullMonth*otCostPerEvent);
  var otCostRemaining=Math.round(eventsRemaining*otCostPerEvent);
  var otCostMTD=Math.round(eventsMTD*otCostPerEvent);
  var thisMthSaving=Math.round(eventsRemaining*savingPerEvent);
  var fullMthSaving=Math.round(eventsFullMonth*savingPerEvent);

  var utrThr=cfg.otUTRThreshold||5;
  var utrOK=maxHourlyOrders<=utrThr;

  var newPickerCost=store.pickerCost-relieverCostMTD+otCostMTD;
  var newPickerCPO=store.orders>0?newPickerCost/store.orders:0;
  var chainStores=(APP.allData||[]).filter(function(r){return r.chain===store.chain;});
  var chainOrders=chainStores.reduce(function(s,r){return s+r.orders;},0);
  var chainPickerCost=chainStores.reduce(function(s,r){return s+(r.pickerCost||0);},0);
  var oldChainCPO=chainOrders>0?chainPickerCost/chainOrders:0;
  var newChainCPO=chainOrders>0?(chainPickerCost-store.pickerCost+newPickerCost)/chainOrders:0;

  return{relieverCount:ri.relieverCount,regularPickers:regularPickers,
    rawStoreHrs:rawStoreHrs,snappedOpen:snappedOpen,snappedClose:snappedClose,
    adjOpen:adjOpen,adjClose:adjClose,adjStoreHrs:adjStoreHrs,
    trimStart:trimStart,trimEnd:trimEnd,
    totalShiftHrs:totalShiftHrs,otHrs:otHrs,otMult:otMult,
    effectiveWDays:effectiveWDays,weekdayOnly:weekdayOnly,
    eventsFullMonth:Math.round(eventsFullMonth*10)/10,eventsRemaining:Math.round(eventsRemaining*10)/10,
    relieverCostRemaining:relieverCostRemaining,relieverCostFullMonth:relieverCostFullMonth,
    otCostRemaining:otCostRemaining,otCostFullMonth:otCostFullMonth,
    thisMthSaving:thisMthSaving,fullMthSaving:fullMthSaving,
    maxHourlyOrders:Math.round(maxHourlyOrders*10)/10,utrThr:utrThr,utrOK:utrOK,
    newPickerCost:Math.round(newPickerCost),newPickerCPO:Math.round(newPickerCPO*100)/100,
    oldChainCPO:Math.round(oldChainCPO*100)/100,newChainCPO:Math.round(newChainCPO*100)/100,
    syncDay:si.syncDay,remainingWorkDays:si.remainingWorkDays,hasTiming:!!timing};
}

// MTD sync projection helper
function _getSyncInfo(workDays){
  var sd=(APP.mtdSync||{}).syncDate;
  if(!sd)return{syncDay:workDays,monthDays:workDays,remainingCalDays:0,remainingWorkDays:0};
  var d=new Date(sd);
  var syncDay=d.getDate();
  var monthDays=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  var remainingCalDays=Math.max(0,monthDays-syncDay);
  var remainingWorkDays=Math.round(workDays*remainingCalDays/monthDays);
  return{syncDay:syncDay,monthDays:monthDays,remainingCalDays:remainingCalDays,remainingWorkDays:remainingWorkDays};
}

// Working days for current month from config + syncDate
function _getWorkDaysForCurrentMonth(){
  var sd=(APP.mtdSync||{}).syncDate;
  if(!sd)return 26;
  var d=new Date(sd);
  var m=d.getMonth()+1,y=d.getFullYear();
  var ov=(APP.config||{}).working_days||[];
  for(var i=0;i<ov.length;i++){if(Number(ov[i].month)===m&&Number(ov[i].year)===y)return Number(ov[i].days);}
  var dim=new Date(y,m,0).getDate();
  if(m===2)return 24;
  if(dim===31)return 27;
  return 26;
}
// Days elapsed = avg calendar working days across pickers
function _getDaysElapsed(store){
  // Use maxDailyPickers (peak concurrent headcount) so reliever person-days don't dilute elapsed days
  var concurrentPickers=store.maxDailyPickers||store.pickerCount||1;
  return Math.max(1,Math.round((store.presentDays||1)/concurrentPickers*10)/10);
}
// Currency symbol from optimizer config
function _getCurrency(){return(APP.optimizerConfig||{}).currency||'AED';}
// Hourly GMV helper
function _getStoreHourlyGMV(vendorId){
  var d=APP.hourlyGMVData||[],vid=String(vendorId||'').trim();
  for(var i=0;i<d.length;i++){if(d[i].vendorId===vid)return d[i].gmv;}
  return null;
}
// Hourly order helpers
function _getStoreHourly(vendorId){
  var d=APP.hourlyData||[],vid=String(vendorId||'').trim();
  for(var i=0;i<d.length;i++){if(d[i].vendorId===vid)return d[i].hourly;}
  return null;
}
function _sumH(h,from,to){var s=0;for(var i=from;i<to&&i<24;i++)s+=(h[i]||0);return s;}
function _fmtH(h){if(h===0||h===24)return'12am';if(h===12)return'12pm';return h<12?h+'am':(h-12)+'pm';}
function _fmtHalf(h){
  var whole=Math.floor(h),half=h%1>=0.5;
  var label=whole===0?'12':(whole<=12?String(whole):String(whole-12));
  var suffix=whole<12?'am':'pm';
  if(whole===12)suffix='pm';
  if(whole===0)suffix='am';
  return label+(half?':30':':00')+suffix;
}
function _snapHalf(h,dir){
  // dir 'up' = ceil to next :00 or :30 (earliest picker can start)
  // dir 'down' = floor to prev :00 or :30 (latest picker must finish)
  var frac=h%1;
  var whole=Math.floor(h);
  if(dir==='up'){
    if(frac<=0)return whole;
    if(frac<=0.5)return whole+0.5;
    return whole+1;
  }else{
    if(frac===0)return whole;
    if(frac<=0.5)return whole;
    return whole+0.5;
  }
}
function _getStoreTiming(vendorId){
  var d=APP.storeTimingData||[],vid=String(vendorId||'').trim();
  var best=null;
  for(var i=0;i<d.length;i++){
    if(d[i].vendorId===vid){if(!best||d[i].duration>best.duration)best=d[i];}
  }
  return best; // {vendorId, openHr, closeHr, duration}
}
// Count weekdays (Mon-Fri) approximation from total working days
function _weekdaysOnly(wDays){return Math.round(wDays*5/7);}
// Trim low-order edge hours from store window; returns {open, close, trimmedStart, trimmedEnd}
function _trimEdgeHours(snappedOpen,snappedClose,hourly,gmv,orderThr,gmvThr){
  var adjOpen=snappedOpen,adjClose=snappedClose;
  var trimStart=[],trimEnd=[];
  // Trim from start: while first integer hour of window has avg orders ≤ threshold
  while(adjOpen<adjClose-1){
    var h=Math.floor(adjOpen);
    var ord=hourly?hourly[h]||0:0;
    var gv=gmv?gmv[h]||0:0;
    if(ord<=orderThr&&gv<=gmvThr){trimStart.push(h);adjOpen+=0.5;}
    else break;
  }
  // Trim from end: while last integer hour has avg orders ≤ threshold
  while(adjClose>adjOpen+1){
    var h2=Math.floor(adjClose-0.5);
    var ord2=hourly?hourly[h2]||0:0;
    var gv2=gmv?gmv[h2]||0:0;
    if(ord2<=orderThr&&gv2<=gmvThr){trimEnd.push(h2);adjClose-=0.5;}
    else break;
  }
  return{open:adjOpen,close:adjClose,trimStart:trimStart,trimEnd:trimEnd};
}
// storeOpen/storeClose in decimal hours (e.g. 8.5=8:30), step by 0.5 for :00/:30 slots
function _findOptShift(hourly,shiftHrs,gmv,storeOpen,storeClose,orderThr,gmvThr){
  var cfg=APP.optimizerConfig||{};
  var oThr=orderThr!=null?orderThr:(cfg.edgeOrderThreshold||1);
  var gThr=gmvThr!=null?gmvThr:(cfg.edgeGMVThreshold||50);
  var OPEN=storeOpen!=null?storeOpen:8;
  var CLOSE=storeClose!=null?storeClose:24;
  var total=_sumH(hourly,Math.floor(OPEN),Math.ceil(CLOSE));
  if(shiftHrs>=(CLOSE-OPEN))return{start:OPEN,end:CLOSE,inShift:total,total:total,lost:0,lossPct:0};
  // Protected hours: avg orders > threshold OR avg daily GMV > gmv threshold
  var protFirst=-1,protLast=-1;
  for(var ph=Math.floor(OPEN);ph<Math.ceil(CLOSE);ph++){
    var ord=hourly[ph]||0,gv=gmv?(gmv[ph]||0):0;
    if(ord>oThr||gv>gThr){if(protFirst<0)protFirst=ph;protLast=ph;}
  }
  var best=-1,bestS=OPEN;
  // Step by 0.5 (every :00 and :30)
  for(var s=OPEN;s+shiftHrs<=CLOSE;s+=0.5){
    var sFloor=Math.floor(s),sCeil=Math.ceil(s+shiftHrs);
    if(protFirst>=0&&(sFloor>protFirst||sCeil-1<protLast))continue;
    var o=_sumH(hourly,sFloor,sCeil);
    if(o>best){best=o;bestS=s;}
  }
  if(best<0){
    return{start:OPEN,end:CLOSE,inShift:total,total:total,lost:0,lossPct:0,notViable:true};
  }
  var lost=Math.max(0,total-best);
  return{start:bestS,end:bestS+shiftHrs,inShift:Math.round(best*10)/10,
    total:Math.round(total*10)/10,lost:Math.round(lost*10)/10,
    lossPct:total>0?Math.round(lost/total*1000)/10:0};
}
function _sparkline(hourly,shiftStart,shiftEnd){
  var W=280,H=36,bW=W/24,maxV=Math.max.apply(null,hourly.concat([0.01]));
  var svg='<svg width="'+W+'" height="'+(H+10)+'" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
  for(var i=0;i<24;i++){
    var v=hourly[i]||0,bh=Math.max(v>0?2:0,Math.round(v/maxV*H));
    var x=Math.round(i*bW),y=H-bh;
    var fill=v===0?'#f1f5f9':(i>=shiftStart&&i<=shiftEnd)?'#FF5A00':'#cbd5e1';
    svg+='<rect x="'+(x+1)+'" y="'+y+'" width="'+(Math.floor(bW)-1)+'" height="'+bh+'" fill="'+fill+'" rx="1"/>';
  }
  [0,6,12,18,23].forEach(function(hr){
    svg+='<text x="'+Math.round(hr*bW)+'" y="'+(H+9)+'" font-size="7" fill="#94a3b8" font-family="sans-serif">'+_fmtH(hr)+'</text>';
  });
  svg+='</svg>';
  return svg;
}
function calcTimingScenario(store){
  var rates=APP.config.vendor_rates||[];
  var dept=(store.dept3pl||'').split(',')[0].trim();
  var vendorCfg=null;
  for(var i=0;i<rates.length;i++){if(rates[i].vendorName===dept||rates[i].vendorName.toLowerCase()===dept.toLowerCase()){vendorCfg=rates[i];break;}}
  var monthRate=vendorCfg?vendorCfg.baseRate:2750;
  var contractHrs=vendorCfg?vendorCfg.hoursPerDay||10:10;
  var wDays=_getWorkDaysForCurrentMonth();
  var daysElapsedTM=_getDaysElapsed(store);
  var avgOrdersPerDay=daysElapsedTM>0?store.orders/daysElapsedTM:0;
  if(avgOrdersPerDay<=0)return null;
  // Minimum pickers so UTR stays ≤ 5 orders/picker-hour at contract shift length
  // Each picker can handle at most: 5 × contractHrs orders/day
  var maxUTR=5;
  var minPickers=Math.ceil(avgOrdersPerDay/(maxUTR*contractHrs));
  if(minPickers<1)minPickers=1;
  var currentPickers=store.maxDailyPickers||store.pickerCount||1;
  var avgRoundedOpd=Math.round(avgOrdersPerDay*10)/10;
  if(minPickers>=currentPickers){
    return calcTimingScenarioNotViable(store,minPickers,contractHrs,avgOrdersPerDay);
  }
  // Cost saving from removing excess pickers — projected via daily rate
  var removedPickers=currentPickers-minPickers;
  var avgPickerCost=currentPickers>0?(store.pickerCost||0)/currentPickers:monthRate/wDays;
  var si2=_getSyncInfo(wDays);
  var dailyPickerRate=si2.syncDay>0?avgPickerCost/si2.syncDay:avgPickerCost/wDays;
  var thisMthSaving=Math.round(removedPickers*dailyPickerRate*si2.remainingWorkDays);
  var fullMthSaving=Math.round(removedPickers*dailyPickerRate*wDays);
  var newPickerCost=Math.max(0,Math.round((store.pickerCost||0)-Math.round(removedPickers*avgPickerCost)));
  var newPickerCPO=store.orders>0?newPickerCost/store.orders:0;
  var chainStores=(APP.allData||[]).filter(function(r){return r.chain===store.chain;});
  var chainOrders=chainStores.reduce(function(s,r){return s+r.orders;},0);
  var chainPickerCost=chainStores.reduce(function(s,r){return s+(r.pickerCost||0);},0);
  var oldChainCPO=chainOrders>0?chainPickerCost/chainOrders:0;
  var newChainCPO=chainOrders>0?(chainPickerCost-store.pickerCost+newPickerCost)/chainOrders:0;
  // Get store timing from Sheet3 for shift boundaries
  var cfg2=APP.optimizerConfig||{};
  var edgeThr2=cfg2.edgeOrderThreshold||1.0;
  var edgeGMV2=cfg2.edgeGMVThreshold||50;
  var hourly=_getStoreHourly(store.vendorId);
  var gmv=_getStoreHourlyGMV(store.vendorId);
  var timing2=_getStoreTiming(store.vendorId);
  var storeOpen2=null,storeClose2=null,trimStart2=[],trimEnd2=[];
  if(timing2){
    var snO=_snapHalf(timing2.openHr,'up'),snC=_snapHalf(timing2.closeHr,'down');
    var tr2=_trimEdgeHours(snO,snC,hourly,gmv,edgeThr2,edgeGMV2);
    storeOpen2=tr2.open; storeClose2=tr2.close;
    trimStart2=tr2.trimStart; trimEnd2=tr2.trimEnd;
  }
  var shiftInfo=hourly?_findOptShift(hourly,contractHrs,gmv,storeOpen2,storeClose2):null;
  // Monthly orders lost from timing change
  var ordersLostThisMth=shiftInfo?Math.round(shiftInfo.lost*si2.remainingWorkDays):0;
  var ordersLostFullMth=shiftInfo?Math.round(shiftInfo.lost*wDays):0;
  // GMV lost = sum of avg daily GMV for hours outside chosen shift
  var gmvLostPerDay=0;
  if(gmv&&shiftInfo){
    var ss=Math.floor(shiftInfo.start),se=Math.ceil(shiftInfo.end);
    var winOpen=storeOpen2!=null?Math.floor(storeOpen2):0;
    var winClose=storeClose2!=null?Math.ceil(storeClose2):24;
    for(var gh=winOpen;gh<winClose;gh++){if(gh<ss||gh>=se)gmvLostPerDay+=(gmv[gh]||0);}
  }
  gmvLostPerDay=Math.round(gmvLostPerDay);
  var gmvLostThisMth=Math.round(gmvLostPerDay*si2.remainingWorkDays);
  var gmvLostFullMth=Math.round(gmvLostPerDay*wDays);
  var trimmedOrders=0,trimmedGMV=0;
  trimStart2.concat(trimEnd2).forEach(function(h){trimmedOrders+=(hourly?hourly[h]||0:0);trimmedGMV+=(gmv?gmv[h]||0:0);});
  trimmedOrders=Math.round(trimmedOrders*10)/10; trimmedGMV=Math.round(trimmedGMV);
  return{viable:true,avgOrdersPerDay:avgRoundedOpd,currentPickers:currentPickers,minPickers:minPickers,
    contractHrs:contractHrs,maxUTR:maxUTR,
    removedPickers:removedPickers,thisMthSaving:thisMthSaving,fullMthSaving:fullMthSaving,
    newPickerCost:newPickerCost,newPickerCPO:Math.round(newPickerCPO*100)/100,
    oldChainCPO:Math.round(oldChainCPO*100)/100,newChainCPO:Math.round(newChainCPO*100)/100,
    shiftInfo:shiftInfo,hourly:hourly,gmv:gmv,
    storeOpen:storeOpen2,storeClose:storeClose2,trimStart:trimStart2,trimEnd:trimEnd2,hasTiming:!!timing2,
    rawOpen:timing2?timing2.openHr:null,rawClose:timing2?timing2.closeHr:null,
    snappedOpen:timing2?snO:null,snappedClose:timing2?snC:null,
    trimmedOrders:trimmedOrders,trimmedGMV:trimmedGMV,
    ordersLostThisMth:ordersLostThisMth,ordersLostFullMth:ordersLostFullMth,
    gmvLostPerDay:gmvLostPerDay,gmvLostThisMth:gmvLostThisMth,gmvLostFullMth:gmvLostFullMth,
    remainingWorkDays:si2.remainingWorkDays,syncDay:si2.syncDay};
}
function calcTimingScenarioNotViable(store,minPickers,contractHrs,avgOrdersPerDay){
  var cfg3=APP.optimizerConfig||{};
  var hourly=_getStoreHourly(store.vendorId);
  var gmv=_getStoreHourlyGMV(store.vendorId);
  var timing3=_getStoreTiming(store.vendorId);
  var so3=null,sc3=null;
  if(timing3){
    var sn3=_snapHalf(timing3.openHr,'up'),sc3b=_snapHalf(timing3.closeHr,'down');
    var tr3=_trimEdgeHours(sn3,sc3b,hourly,gmv,cfg3.edgeOrderThreshold||1,cfg3.edgeGMVThreshold||50);
    so3=tr3.open; sc3=tr3.close;
  }
  var shiftInfo=hourly?_findOptShift(hourly,contractHrs,gmv,so3,sc3):null;
  return{viable:false,avgOrdersPerDay:Math.round(avgOrdersPerDay*10)/10,currentPickers:store.maxDailyPickers||store.pickerCount||1,
    minPickers:minPickers,contractHrs:contractHrs,maxUTR:5,
    shiftInfo:shiftInfo,hourly:hourly,storeOpen:so3,storeClose:sc3,hasTiming:!!timing3};
}

function calcClosureScenario(store){
  var nearbyStore=getNearestSameChain(store);
  var canClose=nearbyStore!==null;
  // Find nearest regardless of radius — for not-viable reason message
  var master=APP.masterData||{};
  var mSelf=master[store.vendorId];
  var nearestAny=null,nearestKmAny=Infinity;
  if(mSelf&&mSelf.lat&&mSelf.lng){
    Object.keys(master).forEach(function(vid){
      if(vid===store.vendorId)return;
      var n=master[vid];
      if(!n.lat||!n.lng)return;
      if((n.chainName||'').toLowerCase()!==(store.chain||'').toLowerCase())return;
      var km=haversineKm(mSelf.lat,mSelf.lng,n.lat,n.lng);
      if(km<nearestKmAny){nearestKmAny=km;nearestAny=n;}
    });
  }
  var wDaysCl=_getWorkDaysForCurrentMonth();
  var siCl=_getSyncInfo(wDaysCl);
  var dailyRateCl=siCl.syncDay>0?(store.pickerCost||0)/siCl.syncDay:(store.pickerCost||0)/wDaysCl;
  var thisMthSaving=Math.round(dailyRateCl*siCl.remainingWorkDays);
  var monthlySaving=Math.round(dailyRateCl*wDaysCl);
  var chainStores=(APP.allData||[]).filter(function(r){return r.chain===store.chain;});
  var chainOrders=chainStores.reduce(function(s,r){return s+r.orders;},0);
  var chainPickerCost=chainStores.reduce(function(s,r){return s+(r.pickerCost||0);},0);
  var oldChainCPO=chainOrders>0?chainPickerCost/chainOrders:0;
  var newChainOrders=chainOrders-store.orders;
  var newChainPickerCost=chainPickerCost-(store.pickerCost||0);
  var newChainCPO=newChainOrders>0?newChainPickerCost/newChainOrders:0;
  var chainImproves=newChainCPO<oldChainCPO;
  return{canClose:canClose,nearbyStore:nearbyStore,
    nearestStoreName:nearestAny?nearestAny.storeName:null,
    nearestKm:nearestKmAny<Infinity?Math.round(nearestKmAny*10)/10:null,
    thisMthSaving:thisMthSaving,monthlySaving:monthlySaving,
    ordersLost:store.orders,
    oldChainCPO:Math.round(oldChainCPO*100)/100,
    newChainCPO:Math.round(newChainCPO*100)/100,
    chainImproves:chainImproves};
}

// ── All Options Engine ────────────────────────────────────────────
function calcAllOptions(store){
  var cfg=APP.optimizerConfig||{};
  var options=[],notViable=[];
  var rates=APP.config.vendor_rates||[];
  var dept=(store.dept3pl||'').split(',')[0].trim();
  var vendorCfg=null;
  for(var ri=0;ri<rates.length;ri++){if(rates[ri].vendorName===dept||rates[ri].vendorName.toLowerCase()===dept.toLowerCase()){vendorCfg=rates[ri];break;}}
  var monthRate=vendorCfg?vendorCfg.baseRate:2750;
  var contractHrs=vendorCfg?(vendorCfg.hoursPerDay||10):10;
  var wDays=_getWorkDaysForCurrentMonth();
  var si=_getSyncInfo(wDays);
  var daysElapsed=_getDaysElapsed(store);
  var avgOPD=daysElapsed>0?store.orders/daysElapsed:0;
  if(avgOPD<=0)return{options:[],notViable:[{label:'All options',reason:'No orders data'}],avgOPD:0};
  var currentPickers=store.maxDailyPickers||store.pickerCount||1;
  var avgPickerCost=currentPickers>0?(store.pickerCost||0)/currentPickers:monthRate/wDays;
  var dailyRate=si.syncDay>0?avgPickerCost/si.syncDay:avgPickerCost/wDays;
  var weekdayOnly=(cfg.weekdayDayOffOnly||0)===1;
  var effWDays=weekdayOnly?_weekdaysOnly(wDays):wDays;
  var effRem=weekdayOnly?_weekdaysOnly(si.remainingWorkDays):si.remainingWorkDays;
  function relFull(n){return Math.round(n*(effWDays/6)*dailyRate);}
  function relThis(n){return Math.round(n*(effRem/6)*dailyRate);}
  var hourly=_getStoreHourly(store.vendorId);
  var gmv=_getStoreHourlyGMV(store.vendorId);
  var utrThr=cfg.otUTRThreshold||5;
  var peakOrders=0,peakHr=0;
  if(hourly){for(var hx=0;hx<24;hx++){if((hourly[hx]||0)>peakOrders){peakOrders=hourly[hx];peakHr=hx;}}}
  var minPickers=peakOrders>0?Math.max(1,Math.ceil(peakOrders/utrThr)):1;
  var canReduceHead=currentPickers>minPickers;
  var pickersReduced=Math.max(0,currentPickers-minPickers);
  var timing=_getStoreTiming(store.vendorId);
  var edgeThr=cfg.edgeOrderThreshold||1;
  var edgeGmv=cfg.edgeGMVThreshold||50;
  var snOpen=null,snClose=null,adjOpen=null,adjClose=null,trimS=[],trimE=[];
  if(timing){
    snOpen=_snapHalf(timing.openHr,'up');snClose=_snapHalf(timing.closeHr,'down');
    var tr=_trimEdgeHours(snOpen,snClose,hourly,gmv,edgeThr,edgeGmv);
    adjOpen=tr.open;adjClose=tr.close;trimS=tr.trimStart;trimE=tr.trimEnd;
  }
  var untrimHrs=snOpen!=null?(snClose-snOpen):null;
  var trimHrs=adjOpen!=null?(adjClose-adjOpen):untrimHrs;
  var totalShift=contractHrs+1;
  function otHrs(activeHrs){return activeHrs!=null?Math.max(0,Math.round((activeHrs-totalShift)*2)/2):0;}
  var otUntrim=otHrs(untrimHrs),otTrim=otHrs(trimHrs);
  var otMult=cfg.otMultiplier||1.5;
  var hrRate=monthRate/(wDays*contractHrs);
  function otCostFull(hrs,pickers){return Math.round(hrs*otMult*hrRate*pickers*wDays);}
  function otCostThis(hrs,pickers){return Math.round(hrs*otMult*hrRate*pickers*si.remainingWorkDays);}
  function chainCPOs(newPC){
    var cs=(APP.allData||[]).filter(function(r){return r.chain===store.chain;});
    var co=cs.reduce(function(s,r){return s+r.orders;},0);
    var cp=cs.reduce(function(s,r){return s+(r.pickerCost||0);},0);
    return{old:co>0?Math.round(cp/co*100)/100:0,nw:co>0?Math.round((cp-(store.pickerCost||0)+newPC)/co*100)/100:0};
  }

  // ── Headcount reduction only ──
  if(currentPickers<=1){
    notViable.push({label:'Reduce headcount',reason:'Already at 1 picker'});
  }else if(!canReduceHead){
    notViable.push({label:'Reduce headcount',reason:'Peak hour '+_fmtH(peakHr)+' has '+peakOrders+' orders — minimum '+minPickers+' pickers needed at UTR threshold '+utrThr+', already at '+currentPickers});
  }else{
    var picLabel=minPickers===1?'1 picker':minPickers+' pickers';
    var pSavF=Math.round(pickersReduced*avgPickerCost);
    var pSavT=Math.round(pickersReduced*dailyRate*si.remainingWorkDays);
    var rF=relFull(minPickers),rT=relThis(minPickers);
    var newPC=Math.max(0,(store.pickerCost||0)-Math.round(pickersReduced*avgPickerCost));
    var chs=chainCPOs(newPC);
    options.push({id:'headcount',label:'Reduce to '+picLabel+' — keep current hours',
      netFull:pSavF-rF,netThis:pSavT-rT,
      breakdown:[{l:'Picker saving ('+pickersReduced+' removed)',v:pSavF,sign:1},{l:'Reliever cost for '+minPickers+' remaining',v:rF,sign:-1}],
      changes:{pickers:currentPickers+'→'+minPickers,hours:'unchanged',ot:otUntrim>0?otUntrim+' hrs (unchanged)':'—'},
      newPickerCPO:store.orders>0?Math.round(newPC/store.orders*100)/100:null,
      oldChCPO:chs.old,newChCPO:chs.nw,notes:[]});
  }

  // ── Trim + headcount or trim + OT ──
  if(!hourly){
    notViable.push({label:'Trim store hours',reason:'No hourly order data for this store'});
  }else if(!timing){
    notViable.push({label:'Trim store hours',reason:'No Sheet3 store timing data for this store'});
  }else{
    var hasTrim=trimS.length||trimE.length;
    var peakInTrim=0;
    if(adjOpen!=null){for(var ht=Math.floor(adjOpen);ht<Math.ceil(adjClose);ht++){if((hourly[ht]||0)>peakInTrim)peakInTrim=hourly[ht];}}
    var minPickersTrim=peakInTrim>0?Math.max(1,Math.ceil(peakInTrim/utrThr)):1;
    var canReduceAfterTrim=currentPickers>minPickersTrim;
    var pickersReducedTrim=Math.max(0,currentPickers-minPickersTrim);
    var trimParts=[];
    if(trimS.length)trimParts.push('open '+_fmtHalf(snOpen)+' → '+_fmtHalf(adjOpen));
    if(trimE.length)trimParts.push('close '+_fmtHalf(snClose)+' → '+_fmtHalf(adjClose));
    var hoursChange=(untrimHrs!=null?Math.round(untrimHrs*10)/10:'?')+'→'+(trimHrs!=null?Math.round(trimHrs*10)/10:'?')+' hrs'+(trimParts.length?' ('+trimParts.join(', ')+')':'');
    var trimAddsOT=hasTrim&&(otUntrim-otTrim)>0;
    if(!hasTrim&&otUntrim===0){
      notViable.push({label:'Trim store hours',reason:'No low-volume edge hours to remove and no OT to eliminate'});
    }else if(!hasTrim){
      notViable.push({label:'Trim store hours',reason:'All hours are above the '+edgeThr+' order/hr threshold — no edges to trim'});
    }else if(canReduceAfterTrim&&trimAddsOT){
      var tPicLbl=minPickersTrim===1?'1 picker':minPickersTrim+' pickers';
      var tPicF=Math.round(pickersReducedTrim*avgPickerCost),tPicT=Math.round(pickersReducedTrim*dailyRate*si.remainingWorkDays);
      var tOTF=otCostFull(otUntrim-otTrim,minPickersTrim),tOTT=otCostThis(otUntrim-otTrim,minPickersTrim);
      var tRF=relFull(minPickersTrim),tRT=relThis(minPickersTrim);
      var tNewPC=Math.max(0,(store.pickerCost||0)-Math.round(pickersReducedTrim*avgPickerCost));
      var tChs=chainCPOs(tNewPC);
      var bkd=[{l:'Picker saving ('+pickersReducedTrim+' removed)',v:tPicF,sign:1},{l:'OT eliminated by trim',v:tOTF,sign:1},{l:'Reliever cost for '+minPickersTrim+' remaining',v:tRF,sign:-1}];
      options.push({id:'trim_headcount',label:'Trim low-volume hours + reduce to '+tPicLbl,
        netFull:(tPicF+tOTF)-tRF,netThis:(tPicT+tOTT)-tRT,
        breakdown:bkd,
        changes:{pickers:currentPickers+'→'+minPickersTrim,hours:hoursChange,ot:otUntrim+'→'+otTrim+' hrs'},
        newPickerCPO:store.orders>0?Math.round(tNewPC/store.orders*100)/100:null,
        oldChCPO:tChs.old,newChCPO:tChs.nw,notes:[]});
    }else if(canReduceAfterTrim&&!trimAddsOT){
      // trim doesn't add extra saving over headcount-only — suppress duplicate
    }else if(trimAddsOT&&!canReduceAfterTrim){
      var oF=otCostFull(otUntrim-otTrim,currentPickers),oT=otCostThis(otUntrim-otTrim,currentPickers);
      options.push({id:'trim_ot',label:'Trim low-volume hours — reduce OT, keep headcount',
        netFull:oF,netThis:oT,
        breakdown:[{l:'OT eliminated',v:oF,sign:1}],
        changes:{pickers:'unchanged',hours:hoursChange,ot:otUntrim+'→'+otTrim+' hrs'},
        newPickerCPO:null,oldChCPO:null,newChCPO:null,
        notes:['Headcount at minimum — peak inside active window: '+peakInTrim+' orders/hr needs '+minPickersTrim+' pickers (threshold: '+utrThr+')']});
    }else{
      notViable.push({label:'Trim store hours',reason:'Trimming edges does not eliminate OT and headcount is already at minimum (peak: '+peakInTrim+' orders/hr, min '+minPickersTrim+' pickers needed)'});
    }
  }

  // ── Store closure ──
  var cl=calcClosureScenario(store);
  if(cl.canClose){
    var clNotes=[];
    if(!cl.chainImproves)clNotes.push('This store\'s CPO is below chain avg — closure would worsen chain CPO');
    // Nearby store extra manpower cost
    var nearbyD=(APP.allData||[]).filter(function(r){return r.vendorId===cl.nearbyStore.vendorId;})[0]||null;
    var nearbyExtraPickersFull=0,nearbyExtraCostFull=0,nearbyExtraCostThis=0,nearbyAbsorbNote='';
    if(nearbyD){
      var nRates=APP.config.vendor_rates||[];
      var nDept=(nearbyD.dept3pl||'').split(',')[0].trim();
      var nVCfg=null;
      for(var nri=0;nri<nRates.length;nri++){if(nRates[nri].vendorName===nDept||nRates[nri].vendorName.toLowerCase()===nDept.toLowerCase()){nVCfg=nRates[nri];break;}}
      var nRate=nVCfg?nVCfg.baseRate:monthRate;
      var nHrs=nVCfg?(nVCfg.hoursPerDay||contractHrs):contractHrs;
      var nPickers=nearbyD.maxDailyPickers||nearbyD.pickerCount||1;
      var nDaysEl=_getDaysElapsed(nearbyD);
      var nOPD=nDaysEl>0?nearbyD.orders/nDaysEl:0;
      var newNOPD=nOPD+avgOPD;
      var maxPerPicker=utrThr*nHrs;
      var nPickersNeeded=maxPerPicker>0?Math.ceil(newNOPD/maxPerPicker):nPickers;
      nearbyExtraPickersFull=Math.max(0,nPickersNeeded-nPickers);
      nearbyExtraCostFull=nearbyExtraPickersFull*nRate;
      nearbyExtraCostThis=Math.round(nearbyExtraPickersFull*(nRate/wDays)*si.remainingWorkDays);
      if(nearbyExtraPickersFull>0){
        nearbyAbsorbNote=cl.nearbyStore.storeName+' needs +'+nearbyExtraPickersFull+' extra picker'+(nearbyExtraPickersFull>1?'s':'')+' — new load '+Math.round(newNOPD*10)/10+' orders/day (capacity '+maxPerPicker+'/picker)';
      }else{
        nearbyAbsorbNote=cl.nearbyStore.storeName+' absorbs orders within current headcount — new load '+Math.round(newNOPD*10)/10+' orders/day, capacity '+Math.round(maxPerPicker*nPickers)+'/day';
      }
    }
    var clBkd=[{l:'This store picker cost saved',v:cl.monthlySaving,sign:1}];
    if(nearbyExtraCostFull>0)clBkd.push({l:'Extra manpower at '+cl.nearbyStore.storeName,v:nearbyExtraCostFull,sign:-1});
    var clNetFull=cl.monthlySaving-nearbyExtraCostFull;
    var clNetThis=cl.thisMthSaving-nearbyExtraCostThis;
    options.push({id:'closure',label:'Close store — redirect to '+cl.nearbyStore.storeName+' ('+cl.nearbyStore.km+' km)',
      netFull:clNetFull,netThis:clNetThis,
      breakdown:clBkd,
      changes:{pickers:currentPickers+'→0',hours:'store closed',ot:'eliminated'},
      ordersLost:cl.ordersLost,
      newPickerCPO:null,oldChCPO:cl.oldChainCPO,newChCPO:cl.newChainCPO,
      notes:clNotes.concat(nearbyAbsorbNote?[nearbyAbsorbNote]:[])});
  }else{
    var clR='No same-chain store within '+(cfg.proximityRadiusKm||5)+' km';
    if(cl.nearestStoreName)clR+=' (nearest: '+cl.nearestStoreName+', '+cl.nearestKm+' km away)';
    notViable.push({label:'Store closure',reason:clR});
  }

  options.sort(function(a,b){return b.netFull-a.netFull;});
  return{options:options,notViable:notViable,avgOPD:Math.round(avgOPD*10)/10};
}

      h+='</div>';
      h+='<div style="display:grid;grid-template-columns:1fr auto;gap:2px 16px;font-size:11px;border-top:1px solid var(--border);padding-top:8px;margin-bottom:6px">';

      });
      var nc=opt.netFull>=0?'#059669':'#dc2626';
      h+='<span style="font-weight:700;color:var(--dark);border-top:1px dashed var(--border);padding-top:4px">Net saving</span>';
      h+='<span style="font-weight:700;color:'+nc+';border-top:1px dashed var(--border);padding-top:4px;text-align:right">'+cur+' '+fmt(Math.abs(opt.netFull))+'/mo'+(opt.netFull<0?' (costs more)':'')+'</span>';
      h+='</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:11px">';
      h+='<span style="color:var(--muted)">This month</span><span style="font-weight:600;color:'+nc+'">'+cur+' '+fmt(Math.abs(opt.netThis))+(opt.netThis<0?' (costs more)':'')+'</span>';

      if(opt.ordersLost){h+='<span style="color:var(--muted)">Orders lost</span><span style="color:#dc2626;font-weight:600">'+fmt(opt.ordersLost)+'/mo</span>';}
      h+='</div>';
      opt.notes.forEach(function(n){h+='<div style="background:#fffbeb;border-radius:5px;padding:4px 8px;font-size:10px;color:#92400e;margin-top:6px"><i class="fas fa-exclamation-triangle" style="margin-right:4px"></i>'+n+'</div>';});

function renderOptimizerView(){
  var cfg=APP.optimizerConfig||{};
  var actThr=cfg.actionThreshold||4.0;
  var critThr=cfg.criticalThreshold||20.0;
  var all=APP.allData||[];
  var flagged=all.filter(function(r){return r.pickerCPO>actThr;}).sort(function(a,b){return b.pickerCPO-a.pickerCPO;});

  if(!all.length){
    document.getElementById('mainContent').innerHTML='<div class="content"><div class="empty-state"><i class="fas fa-calculator" style="font-size:40px;opacity:.3;display:block;margin-bottom:12px"></i><p>Load MTD data on the Dashboard first, then return here.</p></div></div>';
    return;
  }

  // Bulk savings estimate using new options engine
  var bulkTotal=0,bulkStores=0,bulkClosure=0;
  flagged.forEach(function(s){
    var r=calcAllOptions(s);
    if(r.options.length&&r.options[0].netFull>0){bulkTotal+=r.options[0].netFull;bulkStores++;}
    r.options.forEach(function(o){if(o.id==='closure'&&o.netFull>0)bulkClosure+=o.netFull;});
  });

  var h='<div style="padding:16px 28px">';

  // Header + summary banner
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  h+='<div><h2 style="font-size:16px;font-weight:700;color:var(--dark);margin:0"><i class="fas fa-calculator" style="color:var(--primary);margin-right:8px"></i>Cost Optimizer</h2>'
    +'<p style="font-size:11px;color:var(--muted);margin:2px 0 0">'+flagged.length+' stores above CPO '+actThr+' '+_getCurrency()+' threshold — based on current MTD data</p></div>';
  // Chain filter options
  var chains=['All Chains'];
  all.forEach(function(r){if(r.chain&&chains.indexOf(r.chain)===-1)chains.push(r.chain);});
  var selChain=APP._optChain||'All Chains';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">';
  h+='<select onchange="APP._optChain=this.value;renderOptimizerView()" style="padding:5px 10px;font-size:12px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);color:var(--text)">';
  chains.forEach(function(c){h+='<option value="'+c+'"'+(c===selChain?' selected':'')+'>'+c+'</option>';});
  h+='</select>';
  h+='<button class="btn btn-sm '+(APP._optShowAll?'btn-outline':'btn-primary')+'" onclick="APP._optShowAll=false;renderOptimizerView()"><i class="fas fa-exclamation-circle"></i> Flagged</button>';
  h+='<button class="btn btn-sm '+(APP._optShowAll?'btn-primary':'btn-outline')+'" onclick="APP._optShowAll=true;renderOptimizerView()"><i class="fas fa-list"></i> All Stores</button>';
  h+='</div>';
  h+='</div>';

  // Bulk savings bar
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  function savCard(icon,label,val,color,tip){
    return '<div style="background:var(--card);border-radius:var(--radius);padding:14px 16px;border-left:4px solid '+color+';box-shadow:var(--shadow)">'
      +'<div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px"><i class="fas '+icon+'" style="margin-right:4px"></i>'+label+'</div>'
      +'<div style="font-size:20px;font-weight:700;color:'+color+'">'+_getCurrency()+' '+fmt(Math.round(val))+'</div>'
      +'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+tip+'</div></div>';
  }
  h+=savCard('fa-calculator','Best Option Total/mo',bulkTotal,'#059669',bulkStores+' stores with actionable saving');
  h+=savCard('fa-store-slash','Max Closure Saving/mo',bulkClosure,'#dc2626','if all viable low-order stores close');
  h+=savCard('fa-exclamation-circle','Flagged Stores',flagged.length,'#ea580c','above CPO '+actThr+' '+_getCurrency()+' threshold');
  h+='</div>';

  // Store list
  var selChain2=APP._optChain||'All Chains';
  var baseList=APP._optShowAll?all.slice().sort(function(a,b){return (b.pickerCPO||b.loadedCPO||0)-(a.pickerCPO||a.loadedCPO||0);}):flagged;
  var displayStores=selChain2==='All Chains'?baseList:baseList.filter(function(r){return r.chain===selChain2;});
  if(!displayStores.length){h+='<div class="empty-state"><p>No stores above threshold. Lower the action threshold in Settings → Optimizer.</p></div></div>';document.getElementById('mainContent').innerHTML=h;return;}

  displayStores.forEach(function(store,idx){
    var sCPO=store.pickerCPO||0;
    var isCrit=sCPO>critThr;
    var borderColor=isCrit?'#dc2626':'#ea580c';
    if(sCPO<=actThr)borderColor='var(--border)';
    var flagBadge=isCrit
      ?'<span style="background:#fef2f2;color:#dc2626;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700"><i class="fas fa-times-circle" style="margin-right:3px"></i>CRITICAL</span>'
      :sCPO>actThr
      ?'<span style="background:#fff7ed;color:#ea580c;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700"><i class="fas fa-exclamation-circle" style="margin-right:3px"></i>ACTION</span>'
      :'';

    var optResult=calcAllOptions(store);

    h+='<div style="background:var(--card);border-radius:var(--radius);border:1.5px solid '+borderColor+';box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden">';
    // Store header
    h+='<div style="padding:12px 16px;background:'+(isCrit?'#fef2f2':sCPO>actThr?'#fff7ed':'var(--cream)')+';display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px;cursor:pointer" onclick="toggleOptStore(\'os'+idx+'\')">';
    h+='<div style="display:flex;align-items:center;gap:10px">';
    h+='<i class="fas fa-chevron-down" id="os'+idx+'chev" style="color:var(--muted);font-size:10px;transition:transform .2s"></i>';
    h+='<div><div style="font-size:13px;font-weight:700;color:var(--dark)">'+store.storeName+'</div>'
      +'<div style="font-size:11px;color:var(--muted)">'+store.chain+' · '+store.city+' · '+store.dept3pl+'</div></div>'
      +flagBadge+'</div>';
    h+='<div style="display:flex;gap:14px;flex-wrap:wrap">';
    h+='<div style="text-align:center"><div style="font-size:10px;color:var(--muted)">CPO Picker</div><div style="font-size:16px;font-weight:700;color:'+borderColor+'">'+(store.pickerCPO||store.loadedCPO||0).toFixed(2)+'</div></div>';
    h+='<div style="text-align:center"><div style="font-size:10px;color:var(--muted)">Orders/day</div><div style="font-size:14px;font-weight:600">'+(optResult.avgOPD||0)+'</div></div>';
    var concPickers=store.maxDailyPickers||store.pickerCount;
    var rosterTip=store.pickerCount>concPickers?' title="Roster: '+store.pickerCount+' total (incl. relievers)"':'';
    h+='<div style="text-align:center"'+rosterTip+'><div style="font-size:10px;color:var(--muted)">Pickers/day</div><div style="font-size:14px;font-weight:600">'+concPickers+(store.pickerCount>concPickers?'<span style="font-size:10px;color:var(--muted)"> /'+store.pickerCount+'</span>':'')+'</div></div>';
    h+='<div style="text-align:center"><div style="font-size:10px;color:var(--muted)">UTR</div><div style="font-size:14px;font-weight:600">'+(store.utr?store.utr.toFixed(1):'—')+'</div></div>';
    var topOpt=optResult.options[0];
    if(topOpt&&topOpt.netFull>0)h+='<div style="text-align:center"><div style="font-size:10px;color:#059669">Best saving</div><div style="font-size:14px;font-weight:700;color:#059669">'+_getCurrency()+' '+fmt(topOpt.netFull)+'/mo</div></div>';
    h+='</div></div>';

    // Options (collapsible)
    h+='<div id="os'+idx+'" style="display:none;padding:14px 16px">';
    h+=renderStoreOptions(optResult);
    h+='</div></div>'; // close store body, store card
  });

  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function toggleOptStore(id){
  var el=document.getElementById(id);
  var chev=document.getElementById(id+'chev');
  if(!el)return;
  var open=el.style.display==='none'||el.style.display==='';
  el.style.display=open?'block':'none';
  if(chev)chev.style.transform=open?'rotate(180deg)':'';
}

function _extractSheetId(val){
  if(!val)return'';
  val=val.trim();
  // Extract from full URL: /spreadsheets/d/{ID}/
  var m=val.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return m[1];
  // Already an ID (no slashes)
  if(/^[a-zA-Z0-9_-]{20,}$/.test(val))return val;
  return val;
}

function saveSheetIdsFromUI(){
  var ids={};
  ['orders','attendance','master','hourly'].forEach(function(k){
    var el=document.getElementById('sid_'+k);
    if(el&&el.value.trim())ids[k]=_extractSheetId(el.value);
  });
  var st=document.getElementById('sheetIdStatus');
  if(st)st.textContent='Saving...';
  google.script.run
    .withSuccessHandler(function(){
      if(st)st.textContent='Saved! Click Refresh in Dashboard to reload data.';
      setTimeout(function(){if(st)st.textContent='';},6000);
    })
    .withFailureHandler(function(e){
      if(st)st.textContent='Error: '+e.message;
    })
    .saveSheetIds(ids);
}

    :'<span style="background:#fee2e2;color:#991b1b;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">error</span>';
  var detailHtml=detail?'<span style="color:var(--danger);font-size:11px">'+detail+'</span>':'<span style="color:var(--muted)">—</span>';

function startFetchAll(){
  var btn=document.getElementById('fetchAllBtn');
  var progress=document.getElementById('fetchAllProgress');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Getting plan...';}
  if(progress)progress.style.display='';

  google.script.run.withSuccessHandler(function(planResult){
    var plan=planResult.batches, total=planResult.total;
    if(total===0){
      if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-play"></i> Trigger Fetch';}
      if(progress)progress.style.display='none';
      addFetchLogRow(formatTS(new Date().toISOString()),'—','0','success','All data already up to date');
      return;
    }
    if(btn)btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Running...';
    runNextBatch(plan,0,total,btn,progress);
  }).withFailureHandler(function(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-play"></i> Trigger Fetch';}
    showToast('Error: '+e.message,'error');
  }).getPrecomputePlan();
}

function runNextBatch(plan,idx,total,btn,progress){
  if(idx>=total){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-play"></i> Trigger Fetch';}
    if(progress){
      document.getElementById('fetchProgressBar').style.width='100%';
      document.getElementById('fetchProgressText').textContent='Complete!';
      document.getElementById('fetchProgressPct').textContent='100%';
      setTimeout(function(){if(progress)progress.style.display='none';},2000);
    }
    showToast('Fetch complete — all users get instant access!','success');
    renderFetchAllTab_refresh();
    return;
  }

  var pct=Math.round(idx/total*100);
  var items=plan[idx].items||[];
  var batchLabel=items.map(function(x){return x.label||x.period;}).join(', ');
  var timeStr=formatTS(new Date().toISOString());

  if(progress){
    document.getElementById('fetchProgressBar').style.width=pct+'%';
    document.getElementById('fetchProgressText').textContent='Batch '+(idx+1)+' / '+total+' — '+batchLabel;
    document.getElementById('fetchProgressPct').textContent=pct+'%';
  }

  addFetchLogRow(timeStr, batchLabel, items.length, 'running', '');

  google.script.run.withSuccessHandler(function(result){
    // Update the top row to success
    var tbody=document.getElementById('fetchLogBody');
    if(tbody&&tbody.firstChild){
      var cells=tbody.firstChild.querySelectorAll('td');
      if(cells[3])cells[3].innerHTML='<span style="background:#dcfce7;color:#166534;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">success</span>';
    }
    runNextBatch(plan,idx+1,total,btn,progress);
  }).withFailureHandler(function(e){
    var tbody=document.getElementById('fetchLogBody');
    if(tbody&&tbody.firstChild){
      var cells=tbody.firstChild.querySelectorAll('td');
      if(cells[3])cells[3].innerHTML='<span style="background:#fee2e2;color:#991b1b;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">error</span>';
      if(cells[4])cells[4].innerHTML='<span style="color:var(--danger);font-size:11px">'+e.message+'</span>';
    }
    runNextBatch(plan,idx+1,total,btn,progress);
  }).computeBatch(idx,plan);
}

function runInBackground(){

    showToast('Error: '+e.message,'error');

  var h1=prompt('First daily run — hour (0–23, e.g. 6 for 6am):','6');
  if(h1===null)return;

  h+='<select id="hlNameSel" onchange="onHlNameSelChange()" style="width:100%;height:36px;border:1.5px solid var(--border);border-radius:var(--radius);padding:0 8px;font-size:13px;background:var(--bg);color:var(--dark)"></select></div>';
  h+='<div class="form-group" style="flex:2;min-width:160px;display:none" id="hlCustomWrap"><label>Custom Name</label><input id="hlCustomName" placeholder="Enter holiday name"></div>';
  h+='<div class="form-group" style="flex:1;min-width:130px"><label>Date (govt announced)</label><input id="hlDate" type="date"></div>';
  h+='<div style="align-self:flex-end"><button class="btn btn-primary btn-sm" onclick="addHolidayEntry()"><i class="fas fa-plus"></i> Add</button></div>';
  h+='</div></div>';

  // Display holidays grouped by month
  var byMonth={};
  allHolidays.sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(hl){
    if(!hl.date)return;
    var parts=hl.date.split('-');
    var key=parts[0]+'-'+parts[1];
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(hl);
  });
  var monthKeys=Object.keys(byMonth).sort();
  if(monthKeys.length){
    monthKeys.forEach(function(mk){
      var parts=mk.split('-');
      var mn=parseInt(parts[1]);
      var yr=parts[0];
      var mLabel=(monthNames[mn]||mn)+' '+yr;
      h+='<div style="margin-bottom:10px">';
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--primary);border-radius:var(--radius);margin-bottom:4px">';
      h+='<i class="fas fa-calendar-day" style="color:#fff;font-size:11px"></i>';
      h+='<span style="font-size:12px;font-weight:700;color:#fff">'+mLabel+'</span>';
      h+='<span style="font-size:11px;color:rgba(255,255,255,0.75);margin-left:auto">'+byMonth[mk].length+' holiday'+(byMonth[mk].length>1?'s':'')+'</span>';
      h+='</div>';
      byMonth[mk].forEach(function(hl){
        h+='<div style="display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--card);border:1.5px solid var(--border);border-bottom:none;first-child:border-radius">';
        h+='<span style="font-size:13px;font-weight:500;color:var(--dark);flex:1">'+hl.name+'</span>';
        if(hl.country)h+='<span style="font-size:10px;color:var(--muted);background:var(--hover);padding:2px 7px;border-radius:10px">'+hl.country+'</span>';
        h+='<span style="font-size:12px;color:var(--muted);min-width:90px;text-align:right">'+hl.date+'</span>';
        h+='<button class="btn btn-sm btn-outline" style="color:var(--danger);padding:3px 8px" onclick="deleteHolidayEntry(\''+hl.id+'\')"><i class="fas fa-trash"></i></button>';
        h+='</div>';
      });
      h+='</div>';
    });
  } else {
    h+='<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px;background:var(--card);border:1.5px dashed var(--border);border-radius:var(--radius)"><i class="fas fa-calendar-times" style="display:block;font-size:20px;margin-bottom:6px;opacity:0.4"></i>No public holidays added yet</div>';
  }
  return h;
}
function saveRamadan(){
  var cfg={start:document.getElementById('ramStart').value,end:document.getElementById('ramEnd').value};
  if(!cfg.start||!cfg.end){showToast('Select both dates','error');return;}
  google.script.run.withSuccessHandler(function(){APP.ramadanConfig=cfg;renderSettingsTab('workdays');showToast('Ramadan period saved','success');})
    .withFailureHandler(function(e){showToast('Failed: '+e.message,'error');}).saveRamadanConfig(cfg);
}
function addWD(){
  var e={month:parseInt(document.getElementById('wMonth').value),year:parseInt(document.getElementById('wYear').value),workingDays:parseInt(document.getElementById('wDays').value),holidays:[]};
  if(!e.month||!e.year||!e.workingDays){showToast('Fill all fields','error');return;}
  google.script.run.withSuccessHandler(function(r){APP.config.working_days=r;renderSettingsTab('workdays');showToast('Added','success');}).addConfigEntry('working_days',e);
}
function deleteWD(id){google.script.run.withSuccessHandler(function(r){APP.config.working_days=r;renderSettingsTab('workdays');showToast('Deleted','success');}).deleteConfigEntry('working_days',id);}

function onHlCountryChange(){
  var country=document.getElementById('hlCountry').value;
  var sel=document.getElementById('hlNameSel');
  var customWrap=document.getElementById('hlCustomWrap');
  if(country==='Custom'){
    sel.style.display='none';
    customWrap.style.display='';
    return;
  }
  sel.style.display='';
  customWrap.style.display='none';
  var opts=HL_HOLIDAYS[country]||[];
  sel.innerHTML='<option value="">-- Select holiday --</option>'+opts.map(function(n){return'<option>'+n+'</option>';}).join('');
}
function onHlNameSelChange(){}
function addHolidayEntry(){
  var country=document.getElementById('hlCountry').value;
  var name='';
  if(country==='Custom'){
    name=(document.getElementById('hlCustomName').value||'').trim();
  } else {
    name=(document.getElementById('hlNameSel').value||'').trim();
  }
  var date=document.getElementById('hlDate').value;
  if(!name||!date){showToast('Enter holiday name and date','error');return;}
  google.script.run.withSuccessHandler(function(r){APP.holidays=r;renderSettingsTab('workdays');showToast('Holiday added','success');})
    .withFailureHandler(function(e){showToast('Failed: '+e.message,'error');}).addHolidayEntry({name:name,date:date,country:country});
}
function deleteHolidayEntry(id){
  google.script.run.withSuccessHandler(function(r){APP.holidays=r;renderSettingsTab('workdays');showToast('Removed','success');})
    .withFailureHandler(function(e){showToast('Failed: '+e.message,'error');}).deleteHolidayEntry(id);
}

function renderUsersTab(){
  if((APP.user.role||'').toLowerCase()!=='admin')return'<p style="color:var(--muted)">Admins only.</p>';
  var h='<div class="s-title">User Access</div>';
  h+='<div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">';
  h+='<div class="form-row"><div class="form-group"><label>Email</label><input id="uEmail" placeholder="user@talabat.com"></div>';
  h+='<div class="form-group"><label>Role</label><select id="uRole" onchange="onURoleChange()"><option value="admin">Admin</option><option value="manager">Manager</option><option value="supervisor">Supervisor</option></select></div>';
  h+='<div class="form-group" id="uSupGroup" style="display:none"><label>Supervisor Name</label><select id="uSupName"><option value="">Select...</option></select></div>';
  h+='<div><button class="btn btn-primary btn-sm" onclick="addUserAction()"><i class="fas fa-paper-plane"></i> Add</button></div></div></div>';
  h+='<div id="usersTableWrap"><div class="loading"><div class="spinner"></div></div></div>';
  loadUsersTable();
  google.script.run.withSuccessHandler(function(sups){APP.supervisorList=sups||[];}).getSupervisorList();
  return h;
}
function loadUsersTable(){
  google.script.run.withSuccessHandler(function(users){
    var myEmail=(APP.user.email||'').toLowerCase();
    var t='<table class="cfg-table"><tr><th>Email</th><th>Role</th><th>Supervisor</th><th>Status</th><th style="text-align:right">Actions</th></tr>';
    users.forEach(function(u){
      var isMe=u.email===myEmail,isRev=u.status==='revoked';
      var cls=u.role==='admin'?'tag-admin':u.role==='manager'?'tag-manager':u.role==='supervisor'?'tag-supervisor':'tag-viewer';
      t+='<tr style="'+(isRev?'opacity:.6':'')+'">';
      t+='<td>'+u.email+(isMe?'<span style="font-size:10px;color:var(--primary);font-weight:600;margin-left:4px">YOU</span>':'')+'</td>';
      t+='<td><span class="tag '+cls+'">'+u.role+'</span></td><td>'+(u.supervisorName||'—')+'</td>';
      t+='<td><span class="tag" style="background:'+(isRev?'#fef2f2':'#ecfdf5')+';color:'+(isRev?'#dc2626':'#059669')+'">'+(isRev?'Revoked':'Active')+'</span></td>';
      t+='<td style="text-align:right">';
      if(!isMe){
        t+='<button class="btn btn-sm btn-outline" onclick="editUserAction(\''+u.email+'\',\''+u.role+'\',\''+(u.supervisorName||'')+'\')"><i class="fas fa-edit"></i></button> ';
        if(isRev)t+='<button class="btn btn-sm btn-outline" style="color:var(--success)" onclick="reinstateUserAction(\''+u.email+'\')"><i class="fas fa-undo"></i></button> ';
        else t+='<button class="btn btn-sm btn-outline" style="color:var(--warning)" onclick="revokeUserAction(\''+u.email+'\')"><i class="fas fa-ban"></i></button> ';
        t+='<button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="removeUserAction(\''+u.email+'\')"><i class="fas fa-trash"></i></button>';
      }
      t+='</td></tr>';
    });
    t+='</table>';
    var w=document.getElementById('usersTableWrap'); if(w)w.innerHTML=t;
  }).loadUsers();
}
function onURoleChange(){var r=document.getElementById('uRole').value,g=document.getElementById('uSupGroup');if(r==='supervisor'){g.style.display='';var s=document.getElementById('uSupName');s.innerHTML='<option value="">Select...</option>';(APP.supervisorList||[]).forEach(function(n){s.innerHTML+='<option>'+n+'</option>';});}else g.style.display='none';}
function addUserAction(){
  var email=document.getElementById('uEmail').value.trim(),role=document.getElementById('uRole').value;
  var sup=document.getElementById('uSupName')?document.getElementById('uSupName').value:'';
  if(!email){showToast('Enter email','error');return;}if(role==='supervisor'&&!sup){showToast('Select supervisor name','error');return;}
  google.script.run.withSuccessHandler(function(r){if(r&&r.error){showToast(r.error,'error');return;}showToast('User added & invited','success');document.getElementById('uEmail').value='';loadUsersTable();}).addUser(email,role,sup);
}
function editUserAction(email,role,sup){showToast('Edit: change role via remove + re-add for now','error');}
function revokeUserAction(email){showConfirm('Revoke access for '+email+'?',function(){google.script.run.withSuccessHandler(function(){showToast('Revoked','success');loadUsersTable();}).revokeUser(email);});}
function reinstateUserAction(email){google.script.run.withSuccessHandler(function(){showToast('Reinstated','success');loadUsersTable();}).reinstateUser(email);}
function removeUserAction(email){showConfirm('Permanently delete '+email+'?',function(){google.script.run.withSuccessHandler(function(){showToast('Removed','success');loadUsersTable();}).removeUser(email);});}

function renderEmailsTab(){
  if((APP.user.role||'').toLowerCase()!=='admin')return'<p style="color:var(--muted)">Admins only.</p>';
  var h='<div class="s-title">Email Reports</div>';
  h+='<div style="display:flex;gap:10px;margin-bottom:16px">';
  h+='<button class="btn btn-primary" onclick="setupTrigger(\'weekly\')"><i class="fas fa-calendar-week"></i> Enable Weekly (Sun 8AM)</button>';
  h+='<button class="btn btn-primary" onclick="setupTrigger(\'monthly\')"><i class="fas fa-calendar-alt"></i> Enable Monthly (1st 8AM)</button></div>';
  h+='<div class="form-row"><div class="form-group"><label>Test Email To</label><input id="testTo" value="'+(APP.user.email||'')+'"></div>';
  h+='<div class="form-group"><label>Type</label><select id="testType"><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>';
  h+='<div><button class="btn btn-outline btn-sm" onclick="sendTestEmailAction()"><i class="fas fa-paper-plane"></i> Send Test</button></div></div>';
  h+='<div id="triggersInfo"></div>';
  google.script.run.withSuccessHandler(function(trig){
    var t='<h4 style="font-size:12px;margin-bottom:6px;margin-top:12px">Active Triggers</h4>';
    if(!trig.length)t+='<p style="font-size:12px;color:var(--muted)">None set up yet.</p>';
    else{t+='<ul style="font-size:12px">';trig.forEach(function(tr){t+='<li>'+tr.func+'</li>';});t+='</ul>';}
    var el=document.getElementById('triggersInfo');if(el)el.innerHTML=t;
  }).getActiveTriggers();
  return h;
}
function setupTrigger(type){google.script.run.withSuccessHandler(function(r){showToast(r.message,'success');})[type==='weekly'?'setupWeeklyTrigger':'setupMonthlyTrigger']();}
function sendTestEmailAction(){var to=document.getElementById('testTo').value.trim(),type=document.getElementById('testType').value;if(!to){showToast('Enter email','error');return;}google.script.run.withSuccessHandler(function(){showToast('Test sent!','success');}).withFailureHandler(function(e){showToast('Error: '+e.message,'error');}).sendTestEmail(to,type);}

// ================================================================
// HELPERS
// ================================================================
function fmt(n){if(n==null)return'0';return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function cpoColor(v){if(v<=0)return'var(--muted)';if(v<5)return'var(--success)';if(v<10)return'var(--warning)';return'var(--danger)';}
function cpoCls(v){if(v<=0)return'';if(v<5)return'cpo-low';if(v<10)return'cpo-med';return'cpo-high';}
function formatTS(ts){if(!ts)return'—';var d=new Date(ts);return d.toLocaleDateString('en-AE',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit'});}
function showLoading(msg){document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--muted)">'+(msg||'Computing...')+'</div></div>';}
function showEmpty(msg){document.getElementById('mainContent').innerHTML='<div class="empty-state"><i class="fas fa-chart-pie" style="font-size:36px;display:block;margin-bottom:10px;opacity:.3"></i><p>'+msg+'</p><button class="btn btn-primary" onclick="doRefresh()" style="margin-top:10px"><i class="fas fa-sync-alt"></i> Refresh</button></div>';}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+(type||'success')+' show';setTimeout(function(){t.classList.remove('show');},3000);}
function onError(e){showToast('Error: '+(e.message||e),'error');showEmpty('An error occurred. Try refreshing.');}
var confirmCb=null;
function showConfirm(msg,cb){document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmTitle').textContent='Confirm';confirmCb=cb;document.getElementById('confirmModal').classList.add('show');}
function closeConfirm(ok){document.getElementById('confirmModal').classList.remove('show');if(ok&&confirmCb)confirmCb();confirmCb=null;}
</script>
