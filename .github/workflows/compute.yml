name: Compute CPO Data

on:
  schedule:
    # 06:00 UTC = ~10:00 GST (Gulf Standard Time, UTC+4)
    - cron: '0 6 * * *'
    # 12:00 UTC = ~16:00 GST
    - cron: '0 12 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # so the job can commit data/ files back to main

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run compute script
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python scripts/compute.py

      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # only commit if something changed
          git diff --cached --quiet || git commit -m "chore: refresh CPO data [$(date -u +%Y-%m-%dT%H:%M)Z]"
          git push
